<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Configurações</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
</head>
<body>
<div id="sidebar-container"></div>
<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">Configurações</div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px;" id="top-avatar">SA</div>
      <div><div class="topbar-user-name" id="top-user-name">Super Admin</div><div class="topbar-user-profile" id="top-user-perfil">SADM</div></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#64748b;">Sair</button>
  </div>
</header>
<main class="main-content" id="main-content">
  <div class="page-header">
    <div class="page-header-left"><h1>Configurações</h1><p>Dados da empresa e configurações gerais do sistema</p></div>
    <button class="btn btn-primary" id="btn-salvar" onclick="salvarConfig()">💾 Salvar Alterações</button>
  </div>
  <div class="card">
    <h3 style="font-weight:800;color:var(--primary);text-transform:uppercase;margin-bottom:20px;">🏢 Dados da Empresa</h3>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <!-- LOGO -->
      <div style="display:flex;align-items:center;gap:20px;padding:16px;background:#f8fafc;border-radius:12px;border:1.2px solid #e2e8f0;">
        <div id="cfg-logo-preview" style="width:80px;height:80px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;flex-shrink:0;">🏭</div>
        <div>
          <p style="font-size:13px;font-weight:600;color:var(--primary);margin-bottom:4px;">Logo da Empresa</p>
          <p style="font-size:12px;color:#64748b;margin-bottom:10px;">Aparece em todos os relatórios e impressões. Recomendado: 200×200px PNG.</p>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('cfg-logo-input').click()">📷 Alterar Logo</button>
          <input type="file" id="cfg-logo-input" accept="image/*" style="display:none;" onchange="updateLogoConfig(this)">
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Razão Social</label><input id="cfg-razao" type="text" class="form-input"></div>
        <div class="form-group"><label class="form-label">Nome Fantasia</label><input id="cfg-fantasia" type="text" class="form-input"></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">CNPJ</label><input id="cfg-cnpj" type="text" class="form-input" placeholder="00.000.000/0001-00"></div>
        <div class="form-group"><label class="form-label">Inscrição Estadual</label><input id="cfg-ie" type="text" class="form-input"></div>
      </div>
      <div class="form-grid-3">
        <div class="form-group"><label class="form-label">CEP</label><input id="cfg-cep" type="text" class="form-input" placeholder="00000-000" maxlength="9"></div>
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">Rua / Avenida</label><input id="cfg-rua" type="text" class="form-input"></div>
      </div>
      <div class="form-grid-3">
        <div class="form-group"><label class="form-label">Número</label><input id="cfg-numero" type="text" class="form-input"></div>
        <div class="form-group"><label class="form-label">Bairro</label><input id="cfg-bairro" type="text" class="form-input"></div>
        <div class="form-group"><label class="form-label">Cidade</label><input id="cfg-cidade" type="text" class="form-input"></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Telefone</label><input id="cfg-tel" type="text" class="form-input" placeholder="(00) 00000-0000"></div>
        <div class="form-group"><label class="form-label">E-mail</label><input id="cfg-email" type="email" class="form-input"></div>
      </div>
    </div>
  </div>
</main>
<div id="toast-container"></div>
<script>
let _cfgId=null, _logoData=null;

fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML=html;
  document.querySelector('[href="configuracoes.html"]')?.classList.add('active');
  openGroup('sistema');
});
initSidebar('configuracoes.html');

async function loadConfig() {
  try {
    const {data}=await _supabase.from('empresa_config').select('*').limit(1).maybeSingle();
    if(!data) return;
    _cfgId=data.id;
    document.getElementById('cfg-razao').value=data.razao_social||'';
    document.getElementById('cfg-fantasia').value=data.nome_fantasia||'';
    document.getElementById('cfg-cnpj').value=data.cnpj||'';
    document.getElementById('cfg-ie').value=data.ie||'';
    document.getElementById('cfg-cep').value=data.cep||'';
    document.getElementById('cfg-rua').value=data.rua||'';
    document.getElementById('cfg-numero').value=data.numero||'';
    document.getElementById('cfg-bairro').value=data.bairro||'';
    document.getElementById('cfg-cidade').value=data.cidade||'';
    document.getElementById('cfg-tel').value=data.telefone||'';
    document.getElementById('cfg-email').value=data.email||'';
    if(data.logo){_logoData=data.logo;document.getElementById('cfg-logo-preview').innerHTML=`<img src="${data.logo}" style="width:80px;height:80px;object-fit:cover;border-radius:12px;">`;}
  } catch(e){toast('Erro ao carregar configurações.','danger');}
}

function updateLogoConfig(input) {
  if(input.files&&input.files[0]){
    const r=new FileReader();r.onload=e=>{_logoData=e.target.result;document.getElementById('cfg-logo-preview').innerHTML=`<img src="${e.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:12px;">`;const sb=document.getElementById('sb-logo');if(sb)sb.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};r.readAsDataURL(input.files[0]);
  }
}

async function salvarConfig() {
  const btn=document.getElementById('btn-salvar');
  btn.innerHTML='<span class="spin"></span>Salvando...';btn.disabled=true;
  const dados={razao_social:document.getElementById('cfg-razao').value,nome_fantasia:document.getElementById('cfg-fantasia').value,cnpj:document.getElementById('cfg-cnpj').value,ie:document.getElementById('cfg-ie').value,cep:document.getElementById('cfg-cep').value,rua:document.getElementById('cfg-rua').value,numero:document.getElementById('cfg-numero').value,bairro:document.getElementById('cfg-bairro').value,cidade:document.getElementById('cfg-cidade').value,telefone:document.getElementById('cfg-tel').value,email:document.getElementById('cfg-email').value,logo:_logoData||null,atualizado_em:new Date().toISOString()};
  try{
    if(_cfgId){await _supabase.from('empresa_config').update(dados).eq('id',_cfgId);}
    else{const{data}=await _supabase.from('empresa_config').insert(dados).select().single();_cfgId=data.id;}
    const sbName=document.getElementById('sb-company-name');if(sbName)sbName.textContent=dados.nome_fantasia||dados.razao_social||'ERP Industrial';
    await addLog('UPDATE','EMPRESA',_cfgId,'Dados da empresa atualizados');
    toast('Configurações salvas com sucesso!','success');
  }catch(e){toast('Erro ao salvar: '+e.message,'danger');}
  btn.innerHTML='💾 Salvar Alterações';btn.disabled=false;
}

loadConfig();
</script>
</body>
</html>
