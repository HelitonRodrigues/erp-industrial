<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Auditoria</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
</head>
<body>
<div id="sidebar-container"></div>
<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">Auditoria</div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px;" id="top-avatar">SA</div>
      <div><div class="topbar-user-name" id="top-user-name">Super Admin</div><div class="topbar-user-profile" id="top-user-perfil">SADM</div></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#64748b;">Sair</button>
  </div>
</header>
<main class="main-content" id="main-content">
  <div class="page-header">
    <div class="page-header-left"><h1>Auditoria</h1><p>Registro imutável de todas as ações do sistema</p></div>
    <button class="btn btn-secondary" onclick="exportarAuditoria()">⬇️ Exportar CSV</button>
  </div>
  <div class="alert alert-warning">🔒 Os registros de auditoria são imutáveis. Nenhum perfil pode editá-los ou excluí-los.</div>
  <div class="card">
    <div class="search-bar">
      <select class="form-input" id="aud-modulo" style="width:160px;" onchange="filtrarAuditoria()">
        <option value="">Todos os módulos</option>
        <option value="AUTH">Autenticação</option>
        <option value="USUARIOS">Usuários</option>
        <option value="PERFIS">Perfis</option>
        <option value="EMPRESA">Empresa</option>
        <option value="FUNCIONARIOS">Funcionários</option>
        <option value="LINHAS">Linhas</option>
        <option value="TURNOS">Turnos</option>
        <option value="PRODUTOS">Produtos</option>
        <option value="EQUIPAMENTOS">Equipamentos</option>
        <option value="MOTIVOS">Motivos</option>
        <option value="PLANEJAMENTO">Planejamento</option>
        <option value="HORIMETRO">Horímetro</option>
      </select>
      <select class="form-input" id="aud-acao" style="width:140px;" onchange="filtrarAuditoria()">
        <option value="">Todas as ações</option>
        <option value="LOGIN">LOGIN</option>
        <option value="LOGOUT">LOGOUT</option>
        <option value="CREATE">CREATE</option>
        <option value="UPDATE">UPDATE</option>
        <option value="DELETE">DELETE</option>
        <option value="EXPORT">EXPORT</option>
      </select>
      <div class="search-input-wrap" style="flex:1;min-width:200px;">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-input" id="aud-busca" placeholder="Buscar por usuário ou descrição..." oninput="filtrarAuditoria()" style="padding-left:36px;">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Módulo</th><th>Ação</th><th>Detalhes</th></tr></thead>
        <tbody id="tbody-auditoria"></tbody>
      </table>
    </div>
    <div id="aud-empty" class="empty-state hidden"><div class="empty-icon">📋</div><h3>Nenhum registro encontrado</h3><p>Tente ajustar os filtros.</p></div>
    <div id="aud-paginacao" style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:13px;color:#64748b;"></div>
  </div>
</main>
<div id="toast-container"></div>

<script>
let _logs=[], _logsFiltrados=[];
const POR_PAGINA=50;let _pagina=1;

fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML=html;
  document.querySelector('[href="auditoria.html"]')?.classList.add('active');
  openGroup('sistema');
});
initSidebar('auditoria.html');

async function init(){
  const{data}=await _supabase.from('auditoria').select('*').order('created_at',{ascending:false}).limit(500);
  _logs=data||[];_pagina=1;filtrarAuditoria();
}

function filtrarAuditoria(){
  const modulo=document.getElementById('aud-modulo').value;
  const acao=document.getElementById('aud-acao').value;
  const busca=(document.getElementById('aud-busca').value||'').toLowerCase();
  _logsFiltrados=_logs.filter(l=>(!modulo||l.modulo===modulo)&&(!acao||l.acao===acao)&&(!busca||l.usuario_email?.toLowerCase().includes(busca)||l.descricao?.toLowerCase().includes(busca)));
  _pagina=1;renderTabela();
}

function renderTabela(){
  const tbody=document.getElementById('tbody-auditoria');const empty=document.getElementById('aud-empty');const pag=document.getElementById('aud-paginacao');
  tbody.innerHTML='';
  if(!_logsFiltrados.length){empty.classList.remove('hidden');pag.innerHTML='';return;}
  empty.classList.add('hidden');
  const inicio=(_pagina-1)*POR_PAGINA;const fim=inicio+POR_PAGINA;const pagina=_logsFiltrados.slice(inicio,fim);
  const acaoCores={LOGIN:'badge-success',LOGOUT:'badge-gray',CREATE:'badge-success',UPDATE:'badge-info',DELETE:'badge-danger',EXPORT:'badge-warning'};
  pagina.forEach(l=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="font-size:12px;color:#64748b;white-space:nowrap;">${l.created_at?new Date(l.created_at).toLocaleString('pt-BR'):'—'}</td>
      <td style="font-size:12px;">${l.usuario_email||'—'}</td>
      <td><span class="badge badge-gray">${l.modulo||'—'}</span></td>
      <td><span class="badge ${acaoCores[l.acao]||'badge-gray'}">${l.acao||'—'}</span></td>
      <td style="font-size:12px;color:#64748b;">${l.descricao||'—'}</td>`;
    tbody.appendChild(tr);
  });
  const total=_logsFiltrados.length;const totalPags=Math.ceil(total/POR_PAGINA);
  pag.innerHTML=`<span>Exibindo ${inicio+1}–${Math.min(fim,total)} de ${total} registros</span>
    <div style="display:flex;gap:6px;">
      ${_pagina>1?`<button class="btn btn-secondary btn-sm" onclick="_pagina--;renderTabela()">← Anterior</button>`:''}
      <span style="padding:6px 12px;background:#f8fafc;border-radius:6px;font-weight:600;">Pág. ${_pagina}/${totalPags}</span>
      ${_pagina<totalPags?`<button class="btn btn-secondary btn-sm" onclick="_pagina++;renderTabela()">Próxima →</button>`:''}
    </div>`;
}

function exportarAuditoria(){
  exportarCSV(['Data/Hora','Usuário','Módulo','Ação','Detalhes'],
    _logsFiltrados.map(l=>[l.created_at?new Date(l.created_at).toLocaleString('pt-BR'):'—',l.usuario_email||'—',l.modulo||'—',l.acao||'—',l.descricao||'—']),
    'auditoria');
  addLog('EXPORT','AUDITORIA','csv','Exportação CSV de auditoria');
}

init();
</script>
</body>
</html>
