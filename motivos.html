<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Motivos de Parada</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
</head>
<body>
<div id="sidebar-container"></div>
<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">Motivos de Parada</div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px;" id="top-avatar">SA</div>
      <div><div class="topbar-user-name" id="top-user-name">Super Admin</div><div class="topbar-user-profile" id="top-user-perfil">SADM</div></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#64748b;">Sair</button>
  </div>
</header>
<main class="main-content" id="main-content">
  <div class="page-header">
    <div class="page-header-left"><h1>Motivos de Parada</h1><p>Cadastre os motivos utilizados para justificar paradas de produção</p></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-secondary" onclick="exportarCSV(['Nome','Descrição','Status'],_motivos.map(m=>[m.nome,m.descricao||'—',m.status]),'motivos-parada')">⬇️ CSV</button>
      <button class="btn btn-secondary" onclick="exportarPDF('Motivos de Parada',['Nome','Descrição','Status'],_motivos.map(m=>[m.nome,m.descricao||'—',m.status]))">📄 PDF</button>
      <button class="btn btn-primary" onclick="openModalMotivo()">+ Novo Motivo</button>
    </div>
  </div>
  <div class="card">
    <div class="search-bar">
      <div class="search-input-wrap" style="flex:1;"><span class="search-icon">🔍</span><input type="text" class="form-input" id="busca-motivo" placeholder="Buscar motivo..." oninput="renderMotivos()"></div>
      <select class="form-input" id="filtro-status-motivo" style="width:140px;" onchange="renderMotivos()"><option value="">Todos</option><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Nome do Motivo</th><th>Descrição</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody id="tbody-motivos"></tbody></table>
    </div>
    <div id="motivos-empty" class="empty-state hidden"><div class="empty-icon">🛑</div><h3>Nenhum motivo cadastrado</h3><p>Clique em "+ Novo Motivo" para começar.</p></div>
  </div>
</main>

<!-- MODAL MOTIVO -->
<div id="modal-motivo" class="modal-overlay hidden">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header"><div class="modal-title" id="modal-motivo-title">Novo Motivo de Parada</div><button class="modal-close" onclick="closeModal('modal-motivo')">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group"><label class="form-label">Nome do Motivo <span class="req">*</span></label><input id="motivo-nome" type="text" class="form-input" placeholder="Ex: Falta de Matéria-Prima, Quebra de Equipamento"></div>
      <div class="form-group"><label class="form-label">Descrição</label><input id="motivo-desc" type="text" class="form-input" placeholder="Descrição detalhada do motivo"></div>
      <div class="form-group"><label class="form-label">Status</label>
        <select id="motivo-status" class="form-input"><option value="ativo">✅ Ativo</option><option value="inativo">⚫ Inativo</option></select>
      </div>
      <div id="motivo-error" class="hidden alert alert-danger"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-motivo')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-motivo" onclick="salvarMotivo()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAR MOTIVO -->
<div id="modal-view-motivo" class="modal-overlay hidden">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header"><div class="modal-title">🛑 Motivo de Parada</div><button class="modal-close" onclick="closeModal('modal-view-motivo')">✕</button></div>
    <div id="modal-view-motivo-body"></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-view-motivo')">Fechar</button></div>
  </div>
</div>

<!-- MODAL CONFIRMAÇÃO -->
<div id="modal-confirm" class="modal-overlay hidden">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header"><div class="modal-title">⚠️ Confirmar Exclusão</div><button class="modal-close" onclick="closeModal('modal-confirm')">✕</button></div>
    <p id="confirm-msg" style="font-size:14px;color:#475569;line-height:1.6;"></p>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-confirm')">Cancelar</button><button class="btn btn-danger" id="confirm-ok-btn">🗑️ Sim, Excluir</button></div>
  </div>
</div>
<div id="toast-container"></div>

<script>
let _editingMotivoId=null, _motivos=[];

fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML=html;
  document.querySelector('[href="motivos.html"]')?.classList.add('active');
  openGroup('cadastros');
});
initSidebar('motivos.html');

async function init(){const{data}=await _supabase.from('motivos_parada').select('*').order('nome');_motivos=data||[];renderMotivos();}

function renderMotivos(){
  const busca=(document.getElementById('busca-motivo')?.value||'').toLowerCase();
  const status=document.getElementById('filtro-status-motivo')?.value||'';
  const lista=_motivos.filter(m=>(!busca||m.nome?.toLowerCase().includes(busca)||(m.descricao||'').toLowerCase().includes(busca))&&(!status||m.status===status));
  const tbody=document.getElementById('tbody-motivos');const empty=document.getElementById('motivos-empty');
  tbody.innerHTML='';
  if(!lista.length){empty.classList.remove('hidden');return;}empty.classList.add('hidden');
  lista.forEach(m=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong style="color:var(--primary);">${m.nome}</strong></td>
      <td style="font-size:13px;color:#64748b;">${m.descricao||'—'}</td>
      <td><span class="badge ${m.status==='ativo'?'badge-success':'badge-gray'}">${m.status==='ativo'?'✅ Ativo':'⚫ Inativo'}</span></td>
      <td><div class="table-actions">
        <button class="btn btn-secondary btn-sm" onclick="visualizarMotivo('${m.id}')">👁️</button>
        <button class="btn btn-secondary btn-sm" onclick="editarMotivo('${m.id}')">✏️ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmarExclusao('${m.id}','${m.nome}')">🗑️</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
}

function openModalMotivo(){
  _editingMotivoId=null;
  document.getElementById('modal-motivo-title').textContent='Novo Motivo de Parada';
  document.getElementById('motivo-nome').value='';document.getElementById('motivo-desc').value='';
  document.getElementById('motivo-status').value='ativo';document.getElementById('motivo-error').classList.add('hidden');
  document.getElementById('modal-motivo').classList.remove('hidden');
}

function editarMotivo(id){
  const m=_motivos.find(x=>x.id===id);if(!m)return;
  _editingMotivoId=id;
  document.getElementById('modal-motivo-title').textContent='Editar Motivo';
  document.getElementById('motivo-nome').value=m.nome||'';document.getElementById('motivo-desc').value=m.descricao||'';
  document.getElementById('motivo-status').value=m.status||'ativo';document.getElementById('motivo-error').classList.add('hidden');
  document.getElementById('modal-motivo').classList.remove('hidden');
}

async function salvarMotivo(){
  const nome=document.getElementById('motivo-nome').value.trim();
  const errEl=document.getElementById('motivo-error');const btn=document.getElementById('btn-salvar-motivo');
  if(!nome){errEl.textContent='Nome é obrigatório!';errEl.classList.remove('hidden');return;}
  const dados={nome,descricao:document.getElementById('motivo-desc').value.trim()||null,status:document.getElementById('motivo-status').value,atualizado_em:new Date().toISOString()};
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  try{
    if(_editingMotivoId){await _supabase.from('motivos_parada').update(dados).eq('id',_editingMotivoId);await addLog('UPDATE','MOTIVOS',_editingMotivoId,'Atualizado: '+nome);toast('Motivo atualizado!','success');}
    else{const{data,error:err}=await _supabase.from('motivos_parada').insert(dados).select().single();if(err)throw err;await addLog('CREATE','MOTIVOS',data.id,'Novo motivo: '+nome);toast('Motivo cadastrado!','success');}
    closeModal('modal-motivo');await init();
  }catch(e){errEl.textContent='Erro: '+e.message;errEl.classList.remove('hidden');}
  btn.innerHTML='💾 Salvar';btn.disabled=false;
}

function visualizarMotivo(id){
  const m=_motivos.find(x=>x.id===id);if(!m)return;
  document.getElementById('modal-view-motivo-body').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:12px;padding:4px 0;">
      <div style="padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
        <p style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Nome</p>
        <p style="font-size:16px;font-weight:800;color:var(--primary);">${m.nome}</p>
      </div>
      <div style="padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
        <p style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Descrição</p>
        <p style="font-size:14px;color:var(--text);">${m.descricao||'Nenhuma descrição cadastrada.'}</p>
      </div>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
          <p style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:6px;">Status</p>
          <span class="badge ${m.status==='ativo'?'badge-success':'badge-gray'}">${m.status==='ativo'?'✅ Ativo':'⚫ Inativo'}</span>
        </div>
        <div style="flex:1;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">
          <p style="font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Criado em</p>
          <p style="font-size:13px;font-weight:600;color:var(--primary);">${m.created_at?new Date(m.created_at).toLocaleDateString('pt-BR'):'—'}</p>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-view-motivo').classList.remove('hidden');
}

function confirmarExclusao(id,nome){
  document.getElementById('confirm-msg').innerHTML=`Deseja excluir o motivo <strong>${nome}</strong>?`;
  document.getElementById('confirm-ok-btn').onclick=async()=>{await _supabase.from('motivos_parada').delete().eq('id',id);await addLog('DELETE','MOTIVOS',id,'Excluído: '+nome);toast('Motivo excluído.','warning');closeModal('modal-confirm');await init();};
  document.getElementById('modal-confirm').classList.remove('hidden');
}

init();
</script>
</body>
</html>
