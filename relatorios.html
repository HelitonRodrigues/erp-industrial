<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<style>
/* ══════════════════════════════════════════
   CENTRO DE RELATÓRIOS
   ══════════════════════════════════════════ */

/* ── TABS DE CATEGORIA ── */
.cat-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.cat-tab {
  padding: 10px 20px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.cat-tab:hover { color: var(--primary); background: #f8fafc; }
.cat-tab.ativo  { color: var(--primary); border-bottom-color: var(--primary); background: #f0f6ff; border-radius: 8px 8px 0 0; }

/* ── FILTRO BAR ── */
.filtro-bar {
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.filtro-group { display: flex; flex-direction: column; gap: 4px; }
.filtro-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .4px; }
.filtro-bar .form-input { font-size: 13px; padding: 7px 10px; height: 36px; }
.filtro-btns { display: flex; gap: 6px; align-items: flex-end; flex-wrap: wrap; }
.chip-periodo {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  font-size: 12px;
  font-weight: 600;
  color: #475569;
  cursor: pointer;
  transition: all .15s;
}
.chip-periodo:hover, .chip-periodo.ativo { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ── KPI ROW ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi-box {
  background: #fff;
  border-radius: 14px;
  padding: 16px 18px;
  border: 1.5px solid #e2e8f0;
  position: relative;
  overflow: hidden;
}
.kpi-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kc, #e2e8f0);
  border-radius: 14px 14px 0 0;
}
.kpi-box-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; color: var(--primary); }
.kpi-box-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .4px; }
.kpi-box-sub   { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* ── SECTION HEADER ── */
.sec-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.sec-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 16px;
  background: var(--primary);
  border-radius: 2px;
}
.sec-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── CARD PANEL ── */
.panel {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  padding: 20px;
  margin-bottom: 20px;
}

/* ── TABELA ── */
.rel-table-wrap {
  overflow-x: auto;   /* scroll horizontal na tela quando necessário */
  overflow-y: visible;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  width: 100%;
}
.rel-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 0;  /* não forçar largura mínima que cause overflow */
}
.rel-table thead tr { background: var(--primary); }
.rel-table thead th {
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  white-space: nowrap;
}
.rel-table tbody tr { transition: background .1s; cursor: pointer; }
.rel-table tbody tr:hover { background: #f8fafc; }
.rel-table tbody tr:nth-child(even) { background: #fafcff; }
.rel-table tbody tr:nth-child(even):hover { background: #f0f5ff; }
.rel-table td {
  padding: 9px 12px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
  color: #334155;
  font-size: 13px;
}
.rel-table td strong { color: var(--primary); }

/* ── STATUS BADGES ── */
.st { display: inline-block; padding: 3px 9px; border-radius: 8px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.st-ok      { background: #dcfce7; color: #16a34a; }
.st-warn    { background: #fef9c3; color: #b45309; }
.st-danger  { background: #fee2e2; color: #dc2626; }
.st-info    { background: #eff6ff; color: #2563eb; }
.st-gray    { background: #f1f5f9; color: #64748b; }
.st-purple  { background: #f3e8ff; color: #7c3aed; }

/* ── GRÁFICO ── */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.chart-box {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  padding: 20px;
}
.chart-box-title { font-size: 13px; font-weight: 800; color: var(--primary); margin-bottom: 14px; }
.chart-box canvas { max-height: 220px; }

/* ── MODAL DETALHE ── */
.rel-modal-overlay {
  position: fixed; inset: 0; background: rgba(3,32,54,.5);
  z-index: 600; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.rel-modal-overlay.open { opacity: 1; pointer-events: auto; }
.rel-modal {
  background: #fff;
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 780px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 16px 60px rgba(4,45,77,.22);
  transform: translateY(10px);
  transition: transform .2s;
}
.rel-modal-overlay.open .rel-modal { transform: translateY(0); }
.rel-modal-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1.5px solid #e2e8f0;
}
.rel-modal-title { font-size: 17px; font-weight: 800; color: var(--primary); }
.rel-modal-close {
  background: #f1f5f9; border: none; width: 34px; height: 34px;
  border-radius: 9px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; color: #64748b;
}
.rel-modal-close:hover { background: #e2e8f0; }
.det-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.det-cell {
  background: #f8fafc;
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
}
.det-cell-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
.det-cell-value { font-size: 14px; font-weight: 700; color: var(--primary); margin-top: 3px; }

/* ── LOADING ── */
.rel-loading {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
}

/* ── VAZIO ── */
.rel-empty {
  text-align: center;
  padding: 40px 20px;
  color: #94a3b8;
  font-size: 14px;
}

/* ── EXPORT BTNS ── */
.export-btns { display: flex; gap: 8px; }
.btn-pdf  { background: #042D4D; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-pdf:hover { opacity: .85; }
.btn-csv  { background: #16a34a; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-csv:hover { opacity: .85; }
.btn-print{ background: #7c3aed; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-print:hover { opacity: .85; }

/* ── PRINT — layout limpo, sem scroll, cabeçalho empresa sempre visível ── */
@page {
  size: A4 portrait;
  margin: 12mm 14mm;
}
@media print {
  /* 1. Ocultar chrome da aplicação */
  #sidebar-container,
  .sidebar,
  .topbar,
  .filtro-bar,
  .cat-tabs,
  .export-btns,
  .sec-actions,
  #filtro-global,
  #rel-loading,
  .rel-modal-overlay,
  #toast-container,
  .filtro-btns,
  button {
    display: none !important;
  }

  /* 2. Reset de layout — sem margens do sidebar, sem scroll */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    height: auto !important;
    overflow: visible !important;
    background: #fff !important;
    font-size: 11px !important;
  }
  .main-content,
  .main-content.collapsed {
    margin-left: 0 !important;
    padding: 16px 20px !important;
    width: 100% !important;
    max-width: 100% !important;
    overflow: visible !important;
  }

  /* 3. Cabeçalho da empresa — sempre no topo, antes de tudo */
  #print-header-inject {
    display: block !important;
    position: relative !important;
    width: 100% !important;
    margin-bottom: 16px !important;
    page-break-after: avoid !important;
  }

  /* 4. Tabelas sem overflow — expandem para caber no papel */
  .rel-table-wrap {
    overflow: visible !important;
    overflow-x: visible !important;
    width: 100% !important;
  }
  .rel-table {
    width: 100% !important;
    font-size: 9px !important;
    table-layout: fixed !important;
  }
  .rel-table thead th {
    font-size: 8px !important;
    padding: 5px 6px !important;
    white-space: normal !important;
  }
  .rel-table td {
    font-size: 9px !important;
    padding: 5px 6px !important;
    word-break: break-word !important;
    white-space: normal !important;
  }

  /* 5. KPIs — reduzir para caber em linha */
  .kpi-row {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)) !important;
    gap: 6px !important;
    margin-bottom: 10px !important;
  }
  .kpi-box {
    padding: 8px 10px !important;
  }
  .kpi-box-value { font-size: 16px !important; }
  .kpi-box-label { font-size: 9px !important; }
  .kpi-box-sub   { font-size: 9px !important; }

  /* 6. Gráficos — uma coluna, altura reduzida */
  .chart-grid {
    grid-template-columns: 1fr 1fr !important;
    gap: 10px !important;
    page-break-inside: avoid !important;
  }
  .chart-box canvas { max-height: 160px !important; }

  /* 7. Painéis sem quebra interna */
  .panel {
    padding: 12px !important;
    margin-bottom: 12px !important;
    page-break-inside: avoid !important;
    border: 1px solid #e2e8f0 !important;
    border-radius: 6px !important;
    break-inside: avoid !important;
  }
  .sec-title { font-size: 11px !important; margin-bottom: 8px !important; }

  /* 8. Cabeçalho da página — repetir em todas as páginas */
  thead { display: table-header-group !important; }
  tfoot { display: table-footer-group !important; }
  tr    { page-break-inside: avoid !important; break-inside: avoid !important; }

  /* 9. Cores garantidas */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* 10. Badges e status legíveis */
  .st { font-size: 8px !important; padding: 2px 5px !important; }
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .chart-grid { grid-template-columns: 1fr; }
  .kpi-row    { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
@media (max-width: 600px) {
  .filtro-bar { flex-direction: column; }
  .cat-tab    { font-size: 12px; padding: 8px 12px; }
}
</style>
</head>
<body>
<div id="sidebar-container"></div>

<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">📊 Relatórios & Gestão</div>
  <div class="topbar-right">
    <span id="rel-clock" style="font-size:13px;color:#64748b;font-weight:500;"></span>
    <div class="topbar-user">
      <div class="user-avatar" style="width:34px;height:34px;font-size:13px;" id="top-avatar">SA</div>
      <div>
        <div class="topbar-user-name" id="top-user-name">Super Admin</div>
        <div class="topbar-user-profile" id="top-user-perfil">SADM</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#94a3b8;">Sair</button>
  </div>
</header>

<main class="main-content" id="main-content">

  <!-- CABEÇALHO -->
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="margin:0;font-size:24px;font-weight:800;color:var(--primary);">Centro de Relatórios</h1>
      <p style="margin:4px 0 0;font-size:14px;color:#94a3b8;font-weight:500;">Visão gerencial completa de todos os módulos operacionais</p>
    </div>
    <div class="export-btns">
      <button class="btn-print" onclick="imprimirAtual()">🖨️ Imprimir</button>
      <button class="btn-pdf"   onclick="gerarPDFAtual()">📄 PDF</button>
      <button class="btn-csv"   onclick="exportarCSVAtual()">📊 CSV</button>
    </div>
  </div>

  <!-- FILTROS GLOBAIS -->
  <div class="filtro-bar" id="filtro-global">
    <div class="filtro-group">
      <span class="filtro-label">De</span>
      <input type="date" id="f-ini" class="form-input" style="width:145px;">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Até</span>
      <input type="date" id="f-fim" class="form-input" style="width:145px;">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Linha</span>
      <select id="f-linha" class="form-input" style="width:165px;" onchange="carregarAba()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Turno</span>
      <select id="f-turno" class="form-input" style="width:145px;" onchange="carregarAba()">
        <option value="">Todos</option>
        <option>Matutino</option>
        <option>Vespertino</option>
        <option>Noturno</option>
      </select>
    </div>
    <div class="filtro-group" id="fg-status" style="display:none;">
      <span class="filtro-label">Status</span>
      <select id="f-status" class="form-input" style="width:155px;" onchange="carregarAba()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filtro-btns">
      <button class="chip-periodo ativo" onclick="setPeriodo('mes',this)">Mês Atual</button>
      <button class="chip-periodo" onclick="setPeriodo('semana',this)">Semana</button>
      <button class="chip-periodo" onclick="setPeriodo('7d',this)">7 dias</button>
      <button class="chip-periodo" onclick="setPeriodo('30d',this)">30 dias</button>
      <button class="chip-periodo" onclick="setPeriodo('3m',this)">3 meses</button>
      <button class="btn btn-primary btn-sm" onclick="carregarAba()" style="height:36px;">🔍 Filtrar</button>
    </div>
  </div>

  <!-- TABS DE CATEGORIA -->
  <div class="cat-tabs">
    <button class="cat-tab ativo" onclick="trocarAba('producao',this)">⚙️ Produção</button>
    <button class="cat-tab" onclick="trocarAba('qualidade',this)">🧪 Qualidade</button>
    <button class="cat-tab" onclick="trocarAba('manutencao',this)">🔧 Manutenção</button>
    <button class="cat-tab" onclick="trocarAba('almoxarifado',this)">📦 Almoxarifado</button>
    <button class="cat-tab" onclick="trocarAba('expedicao',this)">📤 Expedição</button>
    <button class="cat-tab" onclick="trocarAba('portaria',this)">🚛 Portaria</button>
    <button class="cat-tab" onclick="trocarAba('frota',this)">🚗 Frota</button>
    <button class="cat-tab" onclick="trocarAba('epi',this)">🦺 EPI</button>
    <button class="cat-tab" onclick="trocarAba('custos',this)">💰 Custos</button>
    <button class="cat-tab" onclick="trocarAba('gerencial',this)" style="border-left:2px solid #e2e8f0;margin-left:auto;">📋 Gerencial</button>
  </div>

  <!-- ÁREA DE CONTEÚDO -->
  <div id="rel-loading" class="rel-loading">
    <div class="spin" style="width:40px;height:40px;border-width:3px;margin:0 auto 16px;"></div>
    <div style="font-size:15px;font-weight:600;">Carregando dados...</div>
  </div>
  <div id="rel-content" style="display:none;"></div>

</main>

<!-- MODAL DETALHE -->
<div class="rel-modal-overlay" id="rel-modal" onclick="if(event.target===this)fecharModal()">
  <div class="rel-modal">
    <div class="rel-modal-hdr">
      <div class="rel-modal-title" id="rel-modal-title">Detalhes</div>
      <button class="rel-modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div id="rel-modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ══════════════════════════════════════════════════════════
   ESTADO GLOBAL
   ══════════════════════════════════════════════════════════ */
let _abaAtual = 'producao';
let _linhas   = [];
let _charts   = {};  // instâncias Chart.js ativas
let _empresa  = {};  // dados de empresa_config

/* ── SETUP ── */
fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML = html;
  document.querySelector('[href="relatorios.html"]')?.classList.add('active');
  openGroup('principal');
  initSidebar('relatorios.html');
});

setInterval(()=>{
  document.getElementById('rel-clock').textContent =
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

async function init(){
  setPeriodo('mes', document.querySelector('.chip-periodo.ativo'));
  // Carregar empresa e linhas em paralelo
  const [{data:empData}, {data:ln}] = await Promise.all([
    _supabase.from('empresa_config').select('*').limit(1).maybeSingle(),
    _supabase.from('linhas_producao').select('id,nome').eq('status','ativo').order('nome'),
  ]);
  _empresa = empData || {};
  _linhas  = ln || [];
  const sel = document.getElementById('f-linha');
  _linhas.forEach(l=>{
    const o = document.createElement('option');
    o.value = l.nome; o.textContent = l.nome; sel.appendChild(o);
  });
  await carregarAba();
}

/* ── PERÍODO ── */
function setPeriodo(tipo, btn){
  document.querySelectorAll('.chip-periodo').forEach(c=>c.classList.remove('ativo'));
  if(btn) btn.classList.add('ativo');
  const h = new Date();
  let ini, fim = new Date();
  if(tipo==='mes'){
    ini = new Date(h.getFullYear(), h.getMonth(), 1);
    fim = new Date(h.getFullYear(), h.getMonth()+1, 0);
  } else if(tipo==='semana'){
    ini = new Date(h); ini.setDate(h.getDate()-h.getDay());
    fim = new Date(ini); fim.setDate(ini.getDate()+6);
  } else if(tipo==='7d'){
    ini = new Date(h); ini.setDate(h.getDate()-6);
  } else if(tipo==='30d'){
    ini = new Date(h); ini.setDate(h.getDate()-29);
  } else if(tipo==='3m'){
    ini = new Date(h); ini.setMonth(h.getMonth()-3);
  }
  document.getElementById('f-ini').value = ini.toISOString().split('T')[0];
  document.getElementById('f-fim').value = fim.toISOString().split('T')[0];
}

function getPeriodo(){
  return {
    ini:    document.getElementById('f-ini').value,
    fim:    document.getElementById('f-fim').value,
    linha:  document.getElementById('f-linha').value,
    turno:  document.getElementById('f-turno').value,
    status: document.getElementById('f-status').value,
  };
}

/* ── TROCAR ABA ── */
function trocarAba(aba, btn){
  _abaAtual = aba;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('ativo'));
  if(btn) btn.classList.add('ativo');
  // Reset filtro status
  document.getElementById('fg-status').style.display = 'none';
  document.getElementById('f-status').innerHTML = '<option value="">Todos</option>';
  destruirCharts();
  carregarAba();
}

/* ── CARREGAR ABA ── */
async function carregarAba(){
  document.getElementById('rel-loading').style.display = 'block';
  document.getElementById('rel-content').style.display = 'none';
  destruirCharts();
  try {
    const fn = {
      producao:     abaProducao,
      qualidade:    abaQualidade,
      manutencao:   abaManutencao,
      almoxarifado: abaAlmoxarifado,
      expedicao:    abaExpedicao,
      portaria:     abaPortaria,
      frota:        abaFrota,
      epi:          abaEpi,
      custos:       abaCustos,
      gerencial:    abaGerencial,
    }[_abaAtual];
    if(fn) await fn();
  } catch(e) {
    console.error(_abaAtual, e);
    document.getElementById('rel-content').innerHTML =
      `<div class="rel-empty">⚠️ Erro ao carregar dados: ${e.message}</div>`;
  }
  document.getElementById('rel-loading').style.display = 'none';
  document.getElementById('rel-content').style.display = 'block';
}

/* ══════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════ */
const safe = async q => { try { const r = await q; return r.data||[]; } catch(e){ return []; } };
const fmtN = (v, dec=0) => (v||0).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
const fmtD = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const cor  = (v, b1=85, b2=70) => v>=b1?'#16a34a':v>=b2?'#b45309':'#dc2626';
const st   = (cls,txt) => `<span class="st st-${cls}">${txt}</span>`;

function kpiBox(value, label, sub='', kc='var(--primary)', valCor='var(--primary)'){
  return `<div class="kpi-box" style="--kc:${kc};">
    <div class="kpi-box-value" style="color:${valCor};">${value}</div>
    <div class="kpi-box-label">${label}</div>
    ${sub?`<div class="kpi-box-sub">${sub}</div>`:''}
  </div>`;
}

function secHeader(title, btns=''){
  return `<div class="sec-header">
    <div class="sec-title">${title}</div>
    <div class="sec-actions">${btns}</div>
  </div>`;
}

function destruirCharts(){
  Object.values(_charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  _charts = {};
}

function criarChart(id, config){
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  if(_charts[id]) _charts[id].destroy();
  _charts[id] = new Chart(ctx, config);
}

function abrirModal(titulo, html){
  document.getElementById('rel-modal-title').textContent = titulo;
  document.getElementById('rel-modal-body').innerHTML = html;
  document.getElementById('rel-modal').classList.add('open');
}

function fecharModal(){
  document.getElementById('rel-modal').classList.remove('open');
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') fecharModal(); });

/* ══════════════════════════════════════════════════════════
   ABA — PRODUÇÃO
   ══════════════════════════════════════════════════════════ */
async function abaProducao(){
  const {ini,fim,linha,turno} = getPeriodo();
  let q = _supabase.from('producao').select('*').gte('data',ini).lte('data',fim).order('data',{ascending:false});
  if(linha) q = q.eq('linha',linha);
  if(turno) q = q.eq('turno',turno);
  const rows = await safe(q);

  const tSc  = rows.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tHT  = rows.reduce((s,l)=>s+(l.ht||0),0);
  const tHP  = rows.reduce((s,l)=>s+(l.hp||0),0);
  const tLe  = rows.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const disp = tHT>0?((tHT-tHP)/tHT*100):0;
  const mediaScH = tHT>0?(tSc/(tHT-tHP)):0;

  // Dados por dia para gráfico
  const ppd={};
  rows.forEach(l=>{ ppd[l.data]=(ppd[l.data]||0)+(l.total_sacos||0); });
  const dias = Object.keys(ppd).sort();

  // Por linha
  const porLinha={};
  rows.forEach(l=>{
    if(!porLinha[l.linha]) porLinha[l.linha]={sacos:0,ht:0,hp:0,lancs:0};
    porLinha[l.linha].sacos+=l.total_sacos||0;
    porLinha[l.linha].ht+=l.ht||0;
    porLinha[l.linha].hp+=l.hp||0;
    porLinha[l.linha].lancs++;
  });

  const html = `
    <div class="kpi-row">
      ${kpiBox(fmtN(tSc),'Sacos Produzidos','no período','#2563eb','var(--primary)')}
      ${kpiBox(fmtN(tHT,1)+'h','Horas Trabalhadas','','#0891b2')}
      ${kpiBox(fmtN(tHP,1)+'h','Horas Paradas','',tHP>0?'#dc2626':'#16a34a',tHP>0?'#dc2626':'#16a34a')}
      ${kpiBox(disp.toFixed(1)+'%','Disponibilidade','','',cor(disp))}
      ${kpiBox(fmtN(tLe,1)+' m³','Consumo Lenha','','#b45309','#b45309')}
      ${kpiBox(fmtN(mediaScH,1)+' sc/h','Média sc/h','','#7c3aed')}
      ${kpiBox(rows.filter(l=>l.status==='em_analise').length,'Em Análise','','#f59e0b','#b45309')}
      ${kpiBox(rows.filter(l=>l.status==='aprovado').length,'Aprovados','','#16a34a','#16a34a')}
    </div>

    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-box-title">📈 Produção Diária (sacos)</div>
        <canvas id="chart-prod-dia"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-box-title">🏭 Produção por Linha</div>
        <canvas id="chart-prod-linha"></canvas>
      </div>
    </div>

    <div class="panel">
      ${secHeader('Resumo por Linha',`<button class="btn-csv" onclick="csvProducaoLinha()">📊 CSV por Linha</button>`)}
      <div class="rel-table-wrap">
        <table class="rel-table">
          <thead><tr><th>Linha</th><th>Lançamentos</th><th>Sacos</th><th>H. Trabalhadas</th><th>H. Paradas</th><th>Disponib.</th><th>Média sc/h</th><th>Lenha m³</th></tr></thead>
          <tbody>
            ${Object.entries(porLinha).sort((a,b)=>b[1].sacos-a[1].sacos).map(([ln,d])=>{
              const dp=d.ht>0?((d.ht-d.hp)/d.ht*100):0;
              const msc=d.ht>0?(d.sacos/(d.ht-d.hp)):0;
              const lenhaLn=rows.filter(r=>r.linha===ln).reduce((s,r)=>s+(r.consumo_lenha||0),0);
              return `<tr>
                <td><strong>${ln}</strong></td>
                <td>${d.lancs}</td>
                <td><strong>${fmtN(d.sacos)}</strong></td>
                <td>${fmtN(d.ht,1)}h</td>
                <td style="color:#ef4444;">${fmtN(d.hp,1)}h</td>
                <td>${st(dp>=85?'ok':dp>=70?'warn':'danger',dp.toFixed(1)+'%')}</td>
                <td>${fmtN(msc,1)}</td>
                <td>${fmtN(lenhaLn,1)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      ${secHeader('Lançamentos Detalhados',`
        <button class="btn-csv" onclick="csvProducao()">📊 CSV</button>
        <button class="btn-pdf" onclick="pdfProducao()">📄 PDF</button>
      `)}
      <div class="rel-table-wrap">
        <table class="rel-table">
          <thead><tr><th>Data</th><th>Linha</th><th>Turno</th><th>Encarregado</th><th>Produto</th><th>Sacos</th><th>H.T</th><th>H.P</th><th>Disponib.</th><th>Efic.Prod</th><th>Lenha</th><th>Status</th></tr></thead>
          <tbody id="tbody-prod">
            ${rows.map(l=>{
              const dp=l.ht>0?((l.ht-l.hp)/l.ht*100):0;
              const prods=(l.produtos_op&&l.produtos_op.length?l.produtos_op.map(p=>p.produto).join(', '):l.produto)||'—';
              const stCls={em_analise:'warn',aprovado:'ok',reprovado:'danger',parada:'danger'}[l.status]||'gray';
              const stTxt={em_analise:'🔬 Análise',aprovado:'✅ Aprovado',reprovado:'🔴 Reprovado',parada:'🛑 Parada'}[l.status]||l.status||'—';
              return `<tr onclick="detalheProducao('${l.id}')">
                <td>${fmtD(l.data)}<div style="font-size:10px;color:#94a3b8;">${l.dia_semana||''}</div></td>
                <td><strong>${l.linha}</strong>${l.op_numero?`<div style="font-size:10px;color:#7c3aed;">${l.op_numero}</div>`:''}</td>
                <td>${l.turno}</td>
                <td>${l.encarregado||'—'}</td>
                <td style="font-size:12px;">${prods}</td>
                <td><strong>${fmtN(l.total_sacos)}</strong></td>
                <td>${fmtN(l.ht,2)}h</td>
                <td style="color:#ef4444;">${fmtN(l.hp,2)}h</td>
                <td>${st(dp>=85?'ok':dp>=70?'warn':'danger',dp.toFixed(1)+'%')}</td>
                <td>${l.efic_prod||'—'}</td>
                <td>${fmtN(l.consumo_lenha,1)}</td>
                <td>${st(stCls,stTxt)}</td>
              </tr>`;
            }).join('')||`<tr><td colspan="12" class="rel-empty">Nenhum lançamento no período</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('rel-content').innerHTML = html;

  // Gráficos
  setTimeout(()=>{
    criarChart('chart-prod-dia',{
      type:'bar',
      data:{
        labels: dias.map(d=>fmtD(d)),
        datasets:[{label:'Sacos',data:dias.map(d=>ppd[d]||0),
          backgroundColor:'rgba(4,45,77,.75)',borderRadius:4,borderSkipped:false}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{font:{size:10}}},x:{ticks:{font:{size:9},maxRotation:45}}}}
    });
    const lns = Object.keys(porLinha);
    criarChart('chart-prod-linha',{
      type:'doughnut',
      data:{
        labels:lns,
        datasets:[{data:lns.map(l=>porLinha[l].sacos),
          backgroundColor:['#042D4D','#2563eb','#7c3aed','#0891b2','#16a34a','#f59e0b'],
          borderWidth:2,borderColor:'#fff'}]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12}}}}
    });
  },100);

  // Guardar dados para export
  window._dadosExport = rows;
  window._exportTitulo = 'Produção';
}

function detalheProducao(id){
  const l = (window._dadosExport||[]).find(x=>x.id===id); if(!l) return;
  const dp=l.ht>0?((l.ht-l.hp)/l.ht*100):0;
  const prods=(l.produtos_op&&l.produtos_op.length?l.produtos_op.map(p=>p.produto).join(', '):l.produto)||'—';
  const paradas=(l.paradas_op||[]);
  abrirModal(`Lançamento — ${l.linha} / ${l.turno} / ${fmtD(l.data)}`,`
    <div class="det-grid">
      ${[['Linha',l.linha],['Turno',l.turno],['Encarregado',l.encarregado||'—'],['OP',l.op_numero||'—'],
         ['Produto',prods],['Sacos',fmtN(l.total_sacos)],['H. Trabalhadas',fmtN(l.ht,2)+'h'],
         ['H. Paradas',fmtN(l.hp,2)+'h'],['Disponib.',dp.toFixed(1)+'%'],['Efic. Disp.',l.efic_disp||'—'],
         ['Efic. Prod.',l.efic_prod||'—'],['Lenha',fmtN(l.consumo_lenha,1)+' m³'],
         ['Lote MP',l.lote_mp||'—'],['Status',l.status||'—']]
        .map(([lb,v])=>`<div class="det-cell"><div class="det-cell-label">${lb}</div><div class="det-cell-value" style="font-size:13px;">${v}</div></div>`).join('')}
    </div>
    ${paradas.length?`<div style="margin-top:12px;"><div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px;">⛔ Paradas (${paradas.length})</div>
      ${paradas.map(p=>`<div style="padding:8px 12px;background:#fff8f8;border-radius:8px;border:1px solid #fee2e2;margin-bottom:6px;font-size:13px;">
        <strong style="color:#dc2626;">${p.motivo||'—'}</strong> · ${fmtN(p.duracao_h||p.duracao_horim||0,2)}h${p.obs?` — ${p.obs}`:''}
      </div>`).join('')}</div>`:''}
    ${l.obs?`<div style="margin-top:12px;padding:10px;background:#f8fafc;border-radius:8px;font-size:13px;color:#475569;"><strong>Obs:</strong> ${l.obs}</div>`:''}
  `);
}

/* ══════════════════════════════════════════════════════════
   ABA — QUALIDADE (Laboratório + Pallets)
   ══════════════════════════════════════════════════════════ */
async function abaQualidade(){
  const {ini,fim,linha} = getPeriodo();
  let qL = _supabase.from('producao').select('id,data,linha,turno,status').gte('data',ini).lte('data',fim);
  if(linha) qL = qL.eq('linha',linha);
  const lancs = await safe(qL);
  const ids = lancs.map(l=>l.id);
  const pallets = ids.length ? await safe(_supabase.from('producao_pallets').select('*').in('lancamento_id',ids)) : [];
  const labRows = await safe(_supabase.from('laboratorio').select('*').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59').order('created_at',{ascending:false}).limit(300));

  const aprov = pallets.filter(p=>p.status==='aprovado').length;
  const reprov= pallets.filter(p=>p.status==='reprovado').length;
  const pend  = pallets.filter(p=>p.status==='pendente').length;
  const qual  = (aprov+reprov)>0?(aprov/(aprov+reprov)*100):100;

  const porLn={};
  pallets.forEach(p=>{
    const ln=p.linha||'—';
    if(!porLn[ln]) porLn[ln]={aprov:0,reprov:0,pend:0};
    if(p.status==='aprovado') porLn[ln].aprov++;
    else if(p.status==='reprovado') porLn[ln].reprov++;
    else porLn[ln].pend++;
  });

  const html = `
    <div class="kpi-row">
      ${kpiBox(fmtN(pallets.length),'Total de Pallets','no período','#2563eb')}
      ${kpiBox(fmtN(aprov),'Aprovados','','#16a34a','#16a34a')}
      ${kpiBox(fmtN(reprov),'Reprovados','',reprov>0?'#dc2626':'#16a34a',reprov>0?'#dc2626':'#16a34a')}
      ${kpiBox(fmtN(pend),'Pendentes','',pend>5?'#f59e0b':'#94a3b8',pend>5?'#b45309':'#94a3b8')}
      ${kpiBox(qual.toFixed(1)+'%','Índice de Qualidade','aprov / (aprov+reprov)','',cor(qual,95,85))}
      ${kpiBox(labRows.length,'Registros Lab.','no período','#7c3aed')}
    </div>

    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-box-title">🥧 Status dos Pallets</div>
        <canvas id="chart-pal-status"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-box-title">🏭 Qualidade por Linha</div>
        <canvas id="chart-qual-linha"></canvas>
      </div>
    </div>

    <div class="panel">
      ${secHeader('Pallets por Linha')}
      <div class="rel-table-wrap">
        <table class="rel-table">
          <thead><tr><th>Linha</th><th>Aprovados</th><th>Reprovados</th><th>Pendentes</th><th>Total</th><th>Índice Qualidade</th></tr></thead>
          <tbody>
            ${Object.entries(porLn).map(([ln,d])=>{
              const tot=d.aprov+d.reprov+d.pend;
              const q2=(d.aprov+d.reprov)>0?(d.aprov/(d.aprov+d.reprov)*100):100;
              return`<tr>
                <td><strong>${ln}</strong></td>
                <td style="color:#16a34a;font-weight:700;">${d.aprov}</td>
                <td style="color:${d.reprov>0?'#dc2626':'#94a3b8'};font-weight:700;">${d.reprov}</td>
                <td style="color:#b45309;">${d.pend}</td>
                <td>${tot}</td>
                <td>${st(q2>=95?'ok':q2>=85?'warn':'danger',q2.toFixed(1)+'%')}</td>
              </tr>`;
            }).join('')||`<tr><td colspan="6" class="rel-empty">Sem dados</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      ${secHeader('Pallets Detalhados',`
        <button class="btn-pdf" onclick="pdfQualidade()">📄 PDF</button>
        <button class="btn-csv" onclick="csvPallets()">📊 CSV</button>
      `)}
      <div class="rel-table-wrap">
        <table class="rel-table">
          <thead><tr><th>Nº Pallet</th><th>Linha</th><th>Produto</th><th>Status</th><th>Responsável Lab</th><th>Hora Análise</th></tr></thead>
          <tbody>
            ${pallets.map(p=>{
              const stCls={aprovado:'ok',reprovado:'danger',pendente:'warn'}[p.status]||'gray';
              const stTxt={aprovado:'✅ Aprovado',reprovado:'🔴 Reprovado',pendente:'🟡 Pendente'}[p.status]||p.status;
              return`<tr onclick="detalhePallet('${p.id}')">
                <td><strong>#${p.numero||p.id?.slice(0,6)||'—'}</strong></td>
                <td>${p.linha||'—'}</td>
                <td>${p.produto||'—'}</td>
                <td>${st(stCls,stTxt)}</td>
                <td>${p.responsavel_lab||'—'}</td>
                <td>${p.hora_lab||'—'}</td>
              </tr>`;
            }).join('')||`<tr><td colspan="6" class="rel-empty">Nenhum pallet no período</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('rel-content').innerHTML = html;
  window._dadosExport = pallets; window._exportTitulo = 'Qualidade-Pallets';

  setTimeout(()=>{
    criarChart('chart-pal-status',{type:'pie',data:{
      labels:['Aprovados','Reprovados','Pendentes'],
      datasets:[{data:[aprov,reprov,pend],backgroundColor:['#16a34a','#dc2626','#f59e0b'],borderWidth:2,borderColor:'#fff'}]
    },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12}}}}});
    const lns2=Object.keys(porLn);
    criarChart('chart-qual-linha',{type:'bar',data:{
      labels:lns2,
      datasets:[
        {label:'Aprovados',data:lns2.map(l=>porLn[l].aprov),backgroundColor:'#16a34a',borderRadius:4},
        {label:'Reprovados',data:lns2.map(l=>porLn[l].reprov),backgroundColor:'#dc2626',borderRadius:4},
      ]
    },options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true,ticks:{font:{size:10}}}},
      plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
  },100);
}

function detalhePallet(id){

    </div>
    ${p.obs_lab?`<div style="padding:10px;background:#f8fafc;border-radius:8px;font-size:13px;color:#475569;margin-top:8px;"><strong>Obs:</strong> ${p.obs_lab}</div>`:''}
  `);
}

async function abaManutencao(){
  const {ini,fim,status} = getPeriodo();
  // popular select status
  const sel = document.getElementById('f-status');
  if(sel.options.length===1){
    [['aberta','📋 Aberta'],['em_andamento','🔄 Em andamento'],['concluida','✅ Concluída'],['cancelada','❌ Cancelada']].forEach(([v,t])=>{
      const o=document.createElement('option'); o.value=v; o.textContent=t; sel.appendChild(o);
    });
    document.getElementById('fg-status').style.display='';
  }
  let q = _supabase.from('manutencao').select('*').gte('data_abertura',ini).lte('data_abertura',fim).order('data_abertura',{ascending:false});
  if(status) q = q.eq('status',status);
  const rows = await safe(q);
  const hoje = new Date().toISOString().split('T')[0];

  const abertas  = rows.filter(x=>x.status==='aberta').length;
  const andament = rows.filter(x=>x.status==='em_andamento').length;
  const concl    = rows.filter(x=>x.status==='concluida').length;
  const urgentes = rows.filter(x=>x.prioridade==='urgente').length;
  const atrasadas= rows.filter(x=>x.data_prevista&&x.data_prevista<hoje&&!['concluida','cancelada'].includes(x.status)).length;
  const tHoras   = rows.reduce((s,x)=>s+(x.horas_gastas||0),0);

  const porPrio={urgente:0,alta:0,normal:0,baixa:0};
  rows.forEach(x=>{ if(porPrio[x.prioridade]!==undefined) porPrio[x.prioridade]++; });

  const html = `
    <div class="kpi-row">
      ${kpiBox(rows.length,'Total OS','no período','#2563eb')}
      ${kpiBox(abertas,'Abertas','',abertas>0?'#f59e0b':'#16a34a',abertas>0?'#b45309':'#16a34a')}
      ${kpiBox(andament,'Em Andamento','','#2563eb','#2563eb')}
      ${kpiBox(concl,'Concluídas','','#16a34a','#16a34a')}
      ${kpiBox(urgentes,'Urgentes',atrasadas>0?`${atrasadas} atrasadas`:'',urgentes>0?'#dc2626':'#16a34a',urgentes>0?'#dc2626':'#16a34a')}
      ${kpiBox(fmtN(tHoras,1)+'h','Horas de Manutenção','total no período','#7c3aed')}
    </div>

    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-box-title">📊 OS por Prioridade</div>
        <canvas id="chart-manut-prio"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-box-title">📈 OS por Status</div>
        <canvas id="chart-manut-status"></canvas>
      </div>
    </div>

    <div class="panel">
      ${secHeader('Ordens de Serviço',`
        <button class="btn-csv" onclick="csvManutencao()">📊 CSV</button>
        <button class="btn-pdf" onclick="pdfManutencao()">📄 PDF</button>
      `)}

   ABA — FROTA

async function abaFrota(){
  const {ini,fim} = getPeriodo();
  const [veics, os] = await Promise.all([
    safe(_supabase.from('frota_veiculos').select('*').order('nome')),
    safe(_supabase.from('manutencao').select('*').gte('data_abertura',ini).lte('data_abertura',fim).not('equipamento','is',null)),
  ]);
  const hoje = new Date().toISOString().split('T')[0];
  const em7  = new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const ativos   = veics.filter(v=>v.status==='ativo').length;
  const vencidos = veics.filter(v=>{
    if(v.tipo_revisao==='data') return v.proxima_revisao_data&&v.proxima_revisao_data<=hoje;
    return v.revisao_horas>0&&(v.horimetro_atual||0)>=(v.proxima_revisao||Infinity);
  }).length;

  const html = `
    <div class="kpi-row">
      ${kpiBox(veics.length,'Total Veículos','cadastrados','#2563eb')}
      ${kpiBox(ativos,'Ativos','','#16a34a','#16a34a')}
      ${kpiBox(veics.filter(v=>v.status==='manutencao').length,'Em Manutenção','','#f59e0b','#b45309')}
      ${kpiBox(vencidos,'Revisão Vencida','',vencidos>0?'#dc2626':'#16a34a',vencidos>0?'#dc2626':'#16a34a')}
      ${kpiBox(os.length,'OS no Período','','#7c3aed')}
    </div>

    <div class="panel">
      ${secHeader('Frota Cadastrada',`
        <button class="btn-pdf" onclick="pdfFrota()">📄 PDF</button>
        <button class="btn-csv" onclick="csvFrota()">📊 CSV</button>
      `)}
      <div class="rel-table-wrap">
        <table class="rel-table">
          <thead><tr><th>Veículo</th><th>Placa</th><th>Tipo</th><th>Horímetro</th><th>Próx. Revisão</th><th>Status Revisão</th><th>Situação</th></tr></thead>
          <tbody>
            ${veics.map(v=>{
              let proxRev='—', revSt='gray', revTxt='—';
              if(v.tipo_revisao==='data'){
                proxRev = v.proxima_revisao_data?fmtD(v.proxima_revisao_data):'—';
                if(v.proxima_revisao_data){
                  if(v.proxima_revisao_data<=hoje){revSt='danger';revTxt='🔴 Vencida';}
                  else if(v.proxima_revisao_data<=em7){revSt='warn';revTxt='⚠️ Em 7 dias';}
                  else {revSt='ok';revTxt='✅ Em dia';}
                }
              } else {
                proxRev = v.proxima_revisao?fmtN(v.proxima_revisao,0)+' h':'—';
                const ha = v.horimetro_atual||0;
                if(v.revisao_horas>0&&ha>=(v.proxima_revisao||Infinity)){revSt='danger';revTxt='🔴 Vencida';}
                else if(v.revisao_horas>0&&ha>=(v.proxima_revisao||0)-v.revisao_horas*0.1){revSt='warn';revTxt='⚠️ Próxima';}
                else if(v.revisao_horas>0){revSt='ok';revTxt='✅ Em dia';}
              }
              const sitCls={ativo:'ok',manutencao:'warn',inativo:'gray'}[v.status]||'gray';
              const sitTxt={ativo:'✅ Ativo',manutencao:'🔧 Manutenção',inativo:'⚫ Inativo'}[v.status]||v.status;
              return`<tr onclick="detalheFrota('${v.id}')">
                <td><strong>${v.nome}</strong>${v.modelo?`<div style="font-size:10px;color:#94a3b8;">${v.modelo} ${v.ano||''}</div>`:''}</td>
                <td>${v.placa||'—'}</td>
                <td>${v.tipo||'—'}</td>
                <td>${fmtN(v.horimetro_atual,1)} h</td>
                <td>${proxRev}</td>
                <td>${st(revSt,revTxt)}</td>
                <td>${st(sitCls,sitTxt)}</td>
              </tr>`;
            }).join('')||`<tr><td colspan="7" class="rel-empty">Nenhum veículo cadastrado</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('rel-content').innerHTML = html;
  window._dadosExport = veics; window._exportTitulo = 'Frota';
}

function detalheFrota(id){
  const v=(window._dadosExport||[]).find(x=>x.id===id); if(!v) return;
  const comps=Array.isArray(v.componentes)?v.componentes:[];
  abrirModal(v.nome,`
    <div class="det-grid">
      ${[['Nome',v.nome],['Tipo',v.tipo||'—'],['Placa',v.placa||'—'],['Marca',v.marca||'—'],
         ['Modelo',v.modelo||'—'],['Ano',v.ano||'—'],['Horímetro',fmtN(v.horimetro_atual,1)+' h'],
         ['Tipo Revisão',v.tipo_revisao||'—'],['Próx. Revisão',v.proxima_revisao_data||fmtN(v.proxima_revisao,0)+' h'],
         ['Status',v.status||'—']]
        .map(([lb,vl])=>`<div class="det-cell"><div class="det-cell-label">${lb}</div><div class="det-cell-value" style="font-size:13px;">${vl}</div></div>`).join('')}
    </div>
    ${comps.length?`<div style="margin-top:12px;"><div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px;">Componentes (${comps.length})</div>
      ${comps.slice(0,8).map(c=>`<div style="padding:6px 10px;background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0;margin-bottom:4px;font-size:12px;">
        <strong>${c.nome||c.descricao||'—'}</strong> · Interv: ${c.intervalo_revisao||'—'} h
      </div>`).join('')}</div>`:''}
  `);
}

          <tbody>

/* ══════════════════════════════════════════════════════════
   ABA — GERENCIAL COMPLETO
   ══════════════════════════════════════════════════════════ */
async function abaGerencial(){
  const {ini,fim} = getPeriodo();
  toast('Consolidando dados gerenciais...','info');

  const hoje = new Date().toISOString().split('T')[0];
  const em7  = new Date(Date.now()+7*86400000).toISOString().split('T')[0];

  const [prod,manut,almx,epiEntregas,exp,port,pals,custos,nats,ccs,frota,abastBombas,bpfNcs,martelos] = await Promise.all([
    safe(_supabase.from('producao').select('*').gte('data',ini).lte('data',fim)),
    safe(_supabase.from('manutencao').select('*').gte('data_abertura',ini).lte('data_abertura',fim)),
    safe(_supabase.from('almoxarifado').select('nome,estoque_atual,estoque_minimo,categoria,unidade,custo_unitario')),
    safe(_supabase.from('epi_entregas').select('id,data_prevista_troca')),
    safe(_supabase.from('expedicao_ordens').select('*').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('portaria').select('*').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('producao_pallets').select('status,linha,produto').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('lancamentos_custo').select('*').gte('data',ini).lte('data',fim)),
    safe(_supabase.from('naturezas_custo').select('id,nome,grupo')),
    safe(_supabase.from('centros_custo').select('id,nome')),
    safe(_supabase.from('frota_veiculos').select('*').eq('status','ativo')),
    safe(_supabase.from('abastecimento_bombas').select('nome,litros_atual,capacidade_litros,combustivel')),
    safe(_supabase.from('bpf_ncs').select('id,status').eq('status','pendente')),
    safe(_supabase.from('producao_martelos').select('*').gte('data_retirada',ini)),
  ]);

  // ── PRODUÇÃO ──
  const tSc  = prod.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tHT  = prod.reduce((s,l)=>s+(l.ht||0),0);
  const tHP  = prod.reduce((s,l)=>s+(l.hp||0),0);
  const tLe  = prod.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const disp = tHT>0?((tHT-tHP)/tHT*100):0;
  const mediaScH = (tHT-tHP)>0?tSc/(tHT-tHP):0;
  const prodReprov = prod.filter(l=>l.status==='reprovado').length;
  const prodAnalise= prod.filter(l=>l.status==='em_analise').length;

  // Por linha
  const porLinha={};
  prod.forEach(l=>{
    if(!porLinha[l.linha]) porLinha[l.linha]={sacos:0,ht:0,hp:0,n:0,lenha:0,paradas:0};
    porLinha[l.linha].sacos+=l.total_sacos||0;
    porLinha[l.linha].ht+=l.ht||0; porLinha[l.linha].hp+=l.hp||0;
    porLinha[l.linha].n++; porLinha[l.linha].lenha+=l.consumo_lenha||0;
    porLinha[l.linha].paradas+=(l.paradas_op||[]).length;
  });

  // Por dia (últimos 30d no gráfico)
  const ppd={};
  prod.forEach(l=>{ ppd[l.data]=(ppd[l.data]||0)+(l.total_sacos||0); });
  const dias=Object.keys(ppd).sort();

  // ── QUALIDADE ──
  const palAprov=pals.filter(p=>p.status==='aprovado').length;
  const palRep  =pals.filter(p=>p.status==='reprovado').length;
  const palPend =pals.filter(p=>p.status==='pendente').length;
  const qual=(palAprov+palRep)>0?(palAprov/(palAprov+palRep)*100):100;
  const porLinhaPal={};
  pals.forEach(p=>{const ln=p.linha||'—';if(!porLinhaPal[ln])porLinhaPal[ln]={a:0,r:0,p:0};if(p.status==='aprovado')porLinhaPal[ln].a++;else if(p.status==='reprovado')porLinhaPal[ln].r++;else porLinhaPal[ln].p++;});

  // ── MANUTENÇÃO ──
  const manutAberta  = manut.filter(x=>x.status==='aberta').length;
  const manutAndament= manut.filter(x=>x.status==='em_andamento').length;
  const manutConcl   = manut.filter(x=>x.status==='concluida').length;
  const manutUrg     = manut.filter(x=>x.prioridade==='urgente').length;
  const manutAtras   = manut.filter(x=>x.data_prevista&&x.data_prevista<hoje&&!['concluida','cancelada'].includes(x.status)).length;
  const tHorasManut  = manut.reduce((s,x)=>s+(x.horas_gastas||0),0);
  const porEquip={};
  manut.forEach(o=>{const e=o.equipamento||'—';if(!porEquip[e])porEquip[e]={n:0,h:0,urg:0};porEquip[e].n++;porEquip[e].h+=o.horas_gastas||0;if(o.prioridade==='urgente')porEquip[e].urg++;});

  // ── ALMOXARIFADO ──
  const almxZero =almx.filter(x=>(x.estoque_atual||0)<=0&&(x.estoque_minimo||0)>0).length;
  const almxBaixo=almx.filter(x=>(x.estoque_atual||0)>0&&(x.estoque_atual||0)<=(x.estoque_minimo||0)&&(x.estoque_minimo||0)>0).length;
  const vEstoque =almx.reduce((s,i)=>s+((i.estoque_atual||0)*(i.custo_unitario||0)),0);

  // ── EPI ──
  const epiVenc =epiEntregas.filter(e=>e.data_prevista_troca&&e.data_prevista_troca<hoje).length;
  const epiProx =epiEntregas.filter(e=>e.data_prevista_troca&&e.data_prevista_troca>=hoje&&e.data_prevista_troca<=em7).length;

  // ── EXPEDIÇÃO ──
  const tKgExp  = exp.reduce((s,o)=>s+(parseFloat(o.total_kg)||0),0);
  const expConcl= exp.filter(x=>x.status==='concluido').length;
  const expAtras= exp.filter(x=>x.data_prevista&&x.data_prevista<hoje&&!['concluido','cancelado'].includes(x.status)).length;

  // ── PORTARIA ──
  const tLiqP  = port.reduce((s,v)=>s+(v.peso_liquido||0),0);
  const tBrutoP= port.reduce((s,v)=>s+(v.peso_bruto||0),0);

  // ── CUSTOS ──
  const tCusto = custos.reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const porNat={};
  custos.forEach(l=>{const n=nats.find(x=>x.id===l.natureza_id);const nm=n?.nome||'Outros';porNat[nm]=(porNat[nm]||0)+(parseFloat(l.valor)||0);});
  const porCC={};
  custos.forEach(l=>{const c=ccs.find(x=>x.id===l.centro_custo_id);const nm=c?.nome||'Outros';porCC[nm]=(porCC[nm]||0)+(parseFloat(l.valor)||0);});
  const topNat=Object.entries(porNat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topCC =Object.entries(porCC).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // ── ABASTECIMENTO ──
  const bombCrit=abastBombas.filter(b=>{const p=b.capacidade_litros>0?Math.round((b.litros_atual||0)/b.capacidade_litros*100):0;return p<=20;}).length;

  // ── MARTELOS ──
  const martelosAtivos=martelos.filter(m=>!m.data_devolucao).length;
  const gastoTotal=martelos.reduce((s,m)=>{const g=m.peso_final!=null?Math.max(0,m.peso_inicial-m.peso_final):0;return s+g;},0);

  // ── FROTA ──
  const frotaVenc=frota.filter(v=>{
    if(v.tipo_revisao==='data') return v.proxima_revisao_data&&v.proxima_revisao_data<=hoje;
    return v.revisao_horas>0&&(v.horimetro_atual||0)>=(v.proxima_revisao||Infinity);
  }).length;

  const html = `
    <!-- BANNER PERÍODO -->
    <div style="background:linear-gradient(135deg,#042D4D,#1e4a7a);border-radius:16px;padding:20px 24px;color:#fff;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:12px;font-weight:700;opacity:.65;text-transform:uppercase;letter-spacing:.6px;">Painel Gerencial Consolidado</div>
        <div style="font-size:20px;font-weight:800;margin-top:4px;">${fmtD(ini)} a ${fmtD(fim)}</div>
        <div style="font-size:12px;opacity:.65;margin-top:2px;">Gerado em ${new Date().toLocaleString('pt-BR')}</div>
      </div>
      <button class="btn-pdf" onclick="pdfGerencial()" style="height:36px;white-space:nowrap;">📄 PDF Gerencial</button>
    </div>

    <!-- KPIs PRINCIPAIS -->
    <div class="kpi-row" style="margin-bottom:20px;">
      ${kpiBox(fmtN(tSc),'Sacos Produzidos',prod.length+' lançamentos','#2563eb')}
      ${kpiBox(disp.toFixed(1)+'%','Disponibilidade',fmtN(tHT,1)+'h trab. / '+fmtN(tHP,1)+'h paradas','',cor(disp))}
      ${kpiBox(fmtN(mediaScH,1)+' sc/h','Média de Produção','sacos por hora efetiva','#0891b2')}
      ${kpiBox(fmtN(tLe,1)+' m³','Consumo de Lenha','no período','#b45309','#b45309')}
      ${kpiBox(qual.toFixed(1)+'%','Índice de Qualidade',palAprov+' aprov. / '+palRep+' reprov.','',cor(qual,95,85))}
      ${kpiBox('R$ '+fmtN(tCusto,2),'Custo Total',custos.length+' lançamentos','#dc2626','#dc2626')}
      ${kpiBox(fmtN(tKgExp,1)+' kg','Total Expedido',expConcl+' OEs concluídas','#16a34a','#16a34a')}
      ${kpiBox(fmtN(tLiqP,3)+' t','Peso Líquido Port.',port.length+' veículos','#0891b2')}
    </div>

    <!-- LINHA 1: PRODUÇÃO + QUALIDADE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">

      <!-- PRODUÇÃO POR LINHA -->
      <div class="panel" style="margin:0;">
        ${secHeader('⚙️ Produção por Linha')}
        <div class="rel-table-wrap">
          <table class="rel-table">
            <thead><tr><th>Linha</th><th>Sacos</th><th>H.T</th><th>H.P</th><th>Disponib.</th><th>sc/h</th><th>Lenha</th><th>Part.%</th></tr></thead>
            <tbody>
              ${Object.entries(porLinha).sort((a,b)=>b[1].sacos-a[1].sacos).map(([ln,d])=>{
                const dp=d.ht>0?((d.ht-d.hp)/d.ht*100):0;
                const msc=(d.ht-d.hp)>0?d.sacos/(d.ht-d.hp):0;
                const part=tSc>0?(d.sacos/tSc*100):0;
                return`<tr>
                  <td><strong>${ln}</strong><div style="font-size:10px;color:#94a3b8;">${d.n} lanç.</div></td>
                  <td><strong>${fmtN(d.sacos)}</strong></td>
                  <td>${fmtN(d.ht,1)}h</td><td style="color:#ef4444;">${fmtN(d.hp,1)}h</td>
                  <td>${st(dp>=85?'ok':dp>=70?'warn':'danger',dp.toFixed(1)+'%')}</td>
                  <td>${fmtN(msc,1)}</td>
                  <td style="color:#b45309;">${fmtN(d.lenha,1)}</td>
                  <td>${st('info',part.toFixed(1)+'%')}</td>

function exportarCSVAtual(){
  const dados = window._dadosExport;
  if(!dados?.length){ toast('Nenhum dado para exportar.','warning'); return; }
  const titulo = window._exportTitulo||_abaAtual;
  const {ini,fim} = getPeriodo();
  // CSV genérico com todas as chaves
  const keys = [...new Set(dados.flatMap(r=>Object.keys(r)))].filter(k=>!['id','created_at','atualizado_em'].includes(k));
  exportarCSV(keys, dados.map(r=>keys.map(k=>{
    const v=r[k];
    if(Array.isArray(v)||typeof v==='object'&&v) return JSON.stringify(v);
    return v??'';
  })), `${titulo}_${ini}_${fim}`);
  toast('CSV exportado!','success');
}

function imprimirAtual(){
  // Remover injeção anterior se houver
  document.getElementById('print-header-inject')?.remove();
  document.getElementById('print-header-style')?.remove();

  // Criar cabeçalho da empresa
  const hdr = document.createElement('div');
  hdr.id = 'print-header-inject';
  // Oculto na tela, visível apenas no print (via @media print acima)
  hdr.style.cssText = 'display:none;';
  hdr.innerHTML = buildPrintHeader();

  // Inserir como PRIMEIRO filho do main-content para garantir topo absoluto
  const main = document.getElementById('main-content');
  if(main) main.insertBefore(hdr, main.firstChild);

  window.print();

  // Limpar após diálogo fechar
  setTimeout(()=>{
    document.getElementById('print-header-inject')?.remove();
  }, 3000);
}

/* ── CABEÇALHO EMPRESA (compartilhado entre PDF e impressão) ── */
function buildEmpresaHeader(emp){
  const e = emp || _empresa || {};
  const nome    = e.nome_fantasia || e.razao_social || 'ERP Industrial';
  const razao   = e.razao_social && e.razao_social !== nome ? e.razao_social : '';
  const cnpj    = e.cnpj   ? 'CNPJ: '+e.cnpj : '';
  const ie      = e.ie     ? 'IE: '+e.ie : '';
  const end     = [e.rua && (e.rua + (e.numero?', '+e.numero:'')), e.bairro, e.cidade && (e.cidade+(e.uf?'/'+e.uf:''))].filter(Boolean).join(' — ');
  const tel     = e.telefone ? '📞 '+e.telefone : '';
  const email   = e.email    ? '✉️ '+e.email : '';
  const cep     = e.cep ? 'CEP '+e.cep : '';
  const logoHtml = e.logo
    ? `<img src="${e.logo}" style="height:52px;max-width:120px;object-fit:contain;border-radius:4px;" alt="Logo">`
    : `<div style="width:52px;height:52px;border-radius:8px;background:#042D4D;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;">🏭</div>`;
  const infos = [razao&&`<div style="font-size:10px;color:#475569;margin-top:1px;">${razao}</div>`||'',
    [cnpj,ie].filter(Boolean).join(' &nbsp;|&nbsp; ') ? `<div style="font-size:10px;color:#64748b;margin-top:2px;">${[cnpj,ie].filter(Boolean).join(' &nbsp;|&nbsp; ')}</div>` : '',
    end ? `<div style="font-size:10px;color:#64748b;margin-top:1px;">📍 ${end}${cep?' — '+cep:''}</div>` : '',
    [tel,email].filter(Boolean).join(' &nbsp;|&nbsp; ') ? `<div style="font-size:10px;color:#64748b;margin-top:1px;">${[tel,email].filter(Boolean).join(' &nbsp;|&nbsp; ')}</div>` : '',
  ].filter(Boolean).join('');
  return `<div style="display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:2px solid #042D4D;margin-bottom:14px;">
    ${logoHtml}
    <div style="flex:1;">
      <div style="font-size:18px;font-weight:800;color:#042D4D;line-height:1.1;">${nome}</div>
      ${infos}
    </div>
  </div>`;
}

function buildPrintHeader(){
  return buildEmpresaHeader(_empresa);
}

    /* ── BADGES ── */
    .bd { display: inline-block; padding: 2px 6px; border-radius: 5px; font-size: 9px; font-weight: 700; white-space: nowrap; }
    .bd-ok     { background: #dcfce7; color: #16a34a; }
    .bd-warn   { background: #fef9c3; color: #b45309; }
    .bd-danger { background: #fee2e2; color: #dc2626; }
    .bd-info   { background: #eff6ff; color: #2563eb; }

    /* ── SEÇÕES ── */
    h3 {
      color: #042D4D; font-size: 12px; font-weight: 800;
      margin: 16px 0 8px; padding-left: 8px;
      border-left: 3px solid #042D4D;
      page-break-after: avoid; break-after: avoid;
    }

    /* ── RODAPÉ ── */
    .rodape {
      margin-top: 20px; padding-top: 8px;
      border-top: 1px solid #e2e8f0;
      font-size: 9px; color: #94a3b8;
      display: flex; justify-content: space-between;
    }

    /* ── PAGE E ORIENTAÇÃO ── */
    @page {

      margin: 14mm 16mm;
    }
    /* ── PRINT ── */
    @media print {
      html, body { padding: 0 !important; overflow: visible !important; }
      .emp-header { page-break-after: avoid !important; break-after: avoid !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- CABEÇALHO EMPRESA — sempre primeiro elemento do body -->

function abrirJanelaPDF(html, titulo){
  if(!html){ toast('Erro: sem dados para gerar PDF.','warning'); return; }
  const w = window.open('','_blank');
  if(!w){ toast('Permita pop-ups para gerar o PDF.','warning'); return; }
  w.document.write(html);
  w.document.close();
  // window.print() é chamado automaticamente pelo onload do template htmlPDFBase
  toast('PDF aberto — use Ctrl+P para salvar como PDF.','success');
}

async function pdfProducao(){
  if (!guardAction('relatorios', 'export')) return;
  const {ini,fim,linha,turno}=getPeriodo();
  if(!ini||!fim){toast('Selecione o período antes de gerar o PDF.','warning');return;}
  toast('Gerando PDF de Produção...','info');
  let q=_supabase.from('producao').select('*').gte('data',ini).lte('data',fim).order('data');
  if(linha)q=q.eq('linha',linha); if(turno)q=q.eq('turno',turno);
  const rows=await safe(q);
  const tSc=rows.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tHT=rows.reduce((s,l)=>s+(l.ht||0),0);
  const tHP=rows.reduce((s,l)=>s+(l.hp||0),0);
  const tLe=rows.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const dp=tHT>0?((tHT-tHP)/tHT*100).toFixed(1):0;
  const efM=rows.length?Math.round(rows.reduce((s,l)=>s+(l.eficiencia||0),0)/rows.length):0;
  const analise=rows.filter(l=>l.status==='em_analise').length;
  const aprov=rows.filter(l=>l.status==='aprovado').length;
  const kpis=`<div class="kpis">
    ${[['Total Sacos',fmtN(tSc)],['H. Trabalhadas',fmtN(tHT,1)+'h'],['H. Paradas',fmtN(tHP,1)+'h'],
       ['Disponibilidade',dp+'%'],['Consumo Lenha',fmtN(tLe,1)+' m³'],['Efic. Média',efM+'%'],
       ['Lançamentos',rows.length],['Em Análise',analise],['Aprovados',aprov]]
      .map(([l,v])=>`<div class="kpi"><div class="kpi-v">${v}</div><div class="kpi-l">${l}</div></div>`).join('')}
  </div>`;
  // Resumo por linha
  const porLn={};
  rows.forEach(l=>{if(!porLn[l.linha])porLn[l.linha]={sacos:0,ht:0,hp:0,n:0};porLn[l.linha].sacos+=l.total_sacos||0;porLn[l.linha].ht+=l.ht||0;porLn[l.linha].hp+=l.hp||0;porLn[l.linha].n++;});
  const resumoLinha=Object.entries(porLn).sort((a,b)=>b[1].sacos-a[1].sacos).map(([ln,d])=>{
    const d2=d.ht>0?((d.ht-d.hp)/d.ht*100).toFixed(1):0;
    return`<tr><td><strong>${ln}</strong></td><td>${d.n}</td><td><strong>${fmtN(d.sacos)}</strong></td><td>${fmtN(d.ht,1)}h</td><td>${fmtN(d.hp,1)}h</td><td>${d2}%</td></tr>`;}).join('');
  const tab=`
    <h3>Resumo por Linha</h3>
    <table><thead><tr><th>Linha</th><th>Lançamentos</th><th>Sacos</th><th>H. Trabalhadas</th><th>H. Paradas</th><th>Disponib.</th></tr></thead>
    <tbody>${resumoLinha}</tbody></table>
    <h3>Lançamentos Detalhados</h3>
    <table><thead><tr><th>Data</th><th>Linha</th><th>Turno</th><th>Encarregado</th><th>Produto(s)</th><th>Sacos</th><th>H.T</th><th>H.P</th><th>Disponib.</th><th>Efic.Disp</th><th>Efic.Prod</th><th>Lenha m³</th><th>Status</th></tr></thead>
    <tbody>${rows.map(l=>{
      const d2=l.ht>0?((l.ht-l.hp)/l.ht*100).toFixed(1):0;
      const prods=(l.produtos_op&&l.produtos_op.length?l.produtos_op.map(p=>p.produto).join(', '):l.produto)||'—';
      const stCls={em_analise:'warn',aprovado:'ok',reprovado:'danger',parada:'danger'}[l.status]||'info';
      const stTxt={em_analise:'Análise',aprovado:'Aprovado',reprovado:'Reprovado',parada:'Parada'}[l.status]||l.status||'—';
      return`<tr><td>${l.data||'—'}<br><small style="color:#94a3b8;">${l.dia_semana||''}</small></td>
        <td><strong>${l.linha}</strong>${l.op_numero?`<br><small style="color:#7c3aed;">${l.op_numero}</small>`:''}</td>
        <td>${l.turno}</td><td>${l.encarregado||'—'}</td><td>${prods}</td>
        <td><strong>${fmtN(l.total_sacos)}</strong></td>
        <td>${fmtN(l.ht,2)}h</td><td>${fmtN(l.hp,2)}h</td>
        <td>${d2}%</td><td>${l.efic_disp||'—'}</td><td>${l.efic_prod||'—'}</td>
        <td>${fmtN(l.consumo_lenha,1)}</td>
        <td><span class="bd bd-${stCls}">${stTxt}</span></td></tr>`;
    }).join('')||'<tr><td colspan="13" style="text-align:center;color:#94a3b8;padding:20px;">Nenhum dado</td></tr>'}</tbody></table>`;
  abrirJanelaPDF(htmlPDFBase('Relatório de Produção',`${fmtD(ini)} a ${fmtD(fim)}${linha?' — '+linha:''}${turno?' — '+turno:''}`,kpis,tab));
}

        <td>${o.tipo||'—'}</td><td>${o.equipamento||'—'}</td><td>${o.linha||'—'}</td>
        <td>${prioTxt[o.prioridade]||o.prioridade}</td>
        <td>${fmtD(o.data_abertura)}</td>
        <td>${o.data_prevista?fmtD(o.data_prevista)+(atras?' ⚠️':''):'—'}</td>
        <td><span class="bd bd-${stCls[o.status]||'info'}">${stTxt[o.status]||o.status}</span></td>
        <td>${o.tecnico||'—'}</td>
        <td>${fmtN(o.horas_gastas,1)}h</td></tr>`;
    }).join('')||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:20px;">Nenhuma OS no período</td></tr>'}</tbody></table>`;
  abrirJanelaPDF(htmlPDFBase('Relatório de Manutenção',`${fmtD(ini)} a ${fmtD(fim)}`,kpis,tab));
}

async function pdfEpi(){
  if (!guardAction('relatorios', 'export')) return;
  toast('Gerando PDF de EPI...','info');
  const hoje=new Date().toISOString().split('T')[0];
  const em7=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const [entregas,funcs,epis]=await Promise.all([
    safe(_supabase.from('epi_entregas').select('*').order('data_entrega',{ascending:false})),
    safe(_supabase.from('funcionarios').select('id,nome,setor,funcao').eq('status','ativo').order('nome')),
    safe(_supabase.from('epi_cadastro').select('id,nome,categoria').order('nome')),
  ]);
  const venc=entregas.filter(e=>e.data_prevista_troca&&e.data_prevista_troca<hoje).length;
  const prox=entregas.filter(e=>e.data_prevista_troca&&e.data_prevista_troca>=hoje&&e.data_prevista_troca<=em7).length;
  const ok=entregas.length-venc-prox;
  const kpis=`<div class="kpis">
    ${[['Total Entregas',entregas.length],['EPIs Vencidos',venc],['A Vencer (7d)',prox],['Em Dia',ok]]
      .map(([l,v])=>`<div class="kpi"><div class="kpi-v">${v}</div><div class="kpi-l">${l}</div></div>`).join('')}
  </div>`;
  const tab=`<table><thead><tr><th>Funcionário</th><th>Função</th><th>Setor</th><th>EPI</th><th>Categoria</th><th>Data Entrega</th><th>Troca Prevista</th><th>Dias Restantes</th><th>Status</th></tr></thead>
    <tbody>${entregas.map(e=>{
      const fn=funcs.find(x=>x.id===e.funcionario_id);
      const ep=epis.find(x=>x.id===e.epi_id);
      const dr=e.data_prevista_troca?Math.round((new Date(e.data_prevista_troca)-new Date(hoje))/86400000):null;
      const cls=dr===null?'info':dr<0?'danger':dr<=7?'warn':'ok';
      const txt=dr===null?'—':dr<0?`Vencido (${Math.abs(dr)}d)`:dr<=7?`Em ${dr}d`:`Em dia (${dr}d)`;
      return`<tr>
        <td><strong>${fn?.nome||'—'}</strong></td>
        <td>${fn?.funcao||'—'}</td><td>${fn?.setor||'—'}</td>
        <td>${ep?.nome||'—'}</td><td>${ep?.categoria||'—'}</td>
        <td>${fmtD(e.data_entrega)}</td><td>${fmtD(e.data_prevista_troca)}</td>
        <td style="font-weight:700;">${dr!==null?dr+'d':'—'}</td>
        <td><span class="bd bd-${cls}">${txt}</span></td></tr>`;
    }).join('')||'<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">Nenhuma entrega registrada</td></tr>'}</tbody></table>`;
  abrirJanelaPDF(htmlPDFBase('Relatório de EPI — Controle de Entregas',`Posição em: ${new Date().toLocaleDateString('pt-BR')}`,kpis,tab));
}

async function pdfFrota(){
  if (!guardAction('relatorios', 'export')) return;
  toast('Gerando PDF de Frota...','info');
  const hoje=new Date().toISOString().split('T')[0];
  const em7 =new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const veics=await safe(_supabase.from('frota_veiculos').select('*').order('nome'));
  const vencidos=veics.filter(v=>{
    if(v.tipo_revisao==='data') return v.proxima_revisao_data&&v.proxima_revisao_data<=hoje;
    return v.revisao_horas>0&&(v.horimetro_atual||0)>=(v.proxima_revisao||Infinity);
  }).length;
  const proximos=veics.filter(v=>{
    if(v.tipo_revisao==='data') return v.proxima_revisao_data&&v.proxima_revisao_data>hoje&&v.proxima_revisao_data<=em7;
    return false;
  }).length;
  const kpis=`<div class="kpis">
    ${[['Total',veics.length],['Ativos',veics.filter(v=>v.status==='ativo').length],
       ['Em Manutenção',veics.filter(v=>v.status==='manutencao').length],
       ['Revisão Vencida',vencidos],['Revisão Próxima',proximos]]
      .map(([l,v])=>`<div class="kpi"><div class="kpi-v">${v}</div><div class="kpi-l">${l}</div></div>`).join('')}
  </div>`;
  const prTxt={ativo:'Ativo',manutencao:'Manutenção',inativo:'Inativo'};
  const tab=`<table><thead><tr><th>Veículo</th><th>Placa</th><th>Tipo</th><th>Marca/Modelo</th><th>Ano</th><th>Horímetro</th><th>Tipo Revisão</th><th>Próx. Revisão</th><th>Status Revisão</th><th>Situação</th></tr></thead>
    <tbody>${veics.map(v=>{
      let proxRev='—',revSt='info',revTxt='—';
      if(v.tipo_revisao==='data'){
        proxRev=v.proxima_revisao_data?fmtD(v.proxima_revisao_data):'—';
        if(v.proxima_revisao_data){if(v.proxima_revisao_data<=hoje){revSt='danger';revTxt='Vencida';}else if(v.proxima_revisao_data<=em7){revSt='warn';revTxt='Em 7d';}else{revSt='ok';revTxt='Em dia';}}
      } else {
        proxRev=v.proxima_revisao?fmtN(v.proxima_revisao,0)+' h':'—';
        if(v.revisao_horas>0){if((v.horimetro_atual||0)>=(v.proxima_revisao||Infinity)){revSt='danger';revTxt='Vencida';}else{revSt='ok';revTxt='Em dia';}}
      }
      const sitCls={ativo:'ok',manutencao:'warn',inativo:'info'}[v.status]||'info';
      return`<tr><td><strong>${v.nome}</strong></td><td>${v.placa||'—'}</td><td>${v.tipo||'—'}</td>
        <td>${[v.marca,v.modelo].filter(Boolean).join(' ')||'—'}</td><td>${v.ano||'—'}</td>
        <td>${fmtN(v.horimetro_atual,1)} h</td><td>${v.tipo_revisao||'—'}</td><td>${proxRev}</td>
        <td><span class="bd bd-${revSt}">${revTxt}</span></td>
        <td><span class="bd bd-${sitCls}">${prTxt[v.status]||v.status}</span></td></tr>`;
    }).join('')||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:16px;">Nenhum veículo</td></tr>'}</tbody></table>`;
  abrirJanelaPDF(htmlPDFBase('Relatório de Frota',`Posição em: ${new Date().toLocaleDateString('pt-BR')}`,kpis,tab,null,'landscape'));
}

/* ══════════════════════════════════════════════════════════
   PDF GERENCIAL COMPLETO
   ══════════════════════════════════════════════════════════ */
async function pdfGerencial(){
  if (!guardAction('relatorios', 'export')) return;
  const {ini,fim}=getPeriodo();
  if(!ini||!fim){toast('Selecione o período antes de gerar o PDF.','warning');return;}
  toast('Gerando PDF Gerencial Completo...','info');
  const hoje=new Date().toISOString().split('T')[0];
  const em7 =new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const [prod,manut,almx,epiEnt,exp,port,pals,custos,nats,ccs,frota,bpfNcs,abastBombas]=await Promise.all([
    safe(_supabase.from('producao').select('linha,total_sacos,ht,hp,consumo_lenha,status,efic_disp,efic_prod,paradas_op').gte('data',ini).lte('data',fim)),
    safe(_supabase.from('manutencao').select('id,prioridade,status,horas_gastas,equipamento,linha,data_prevista').gte('data_abertura',ini).lte('data_abertura',fim)),
    safe(_supabase.from('almoxarifado').select('nome,estoque_atual,estoque_minimo,custo_unitario')),
    safe(_supabase.from('epi_entregas').select('id,data_prevista_troca')),
    safe(_supabase.from('expedicao_ordens').select('status,total_kg,data_prevista').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('portaria').select('peso_liquido,peso_bruto,peso_tara,status').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('producao_pallets').select('status,linha').gte('created_at',ini+'T00:00:00').lte('created_at',fim+'T23:59:59')),
    safe(_supabase.from('lancamentos_custo').select('valor,natureza_id,centro_custo_id').gte('data',ini).lte('data',fim)),
    safe(_supabase.from('naturezas_custo').select('id,nome')),
    safe(_supabase.from('centros_custo').select('id,nome')),
    safe(_supabase.from('frota_veiculos').select('nome,tipo_revisao,proxima_revisao_data,proxima_revisao,revisao_horas,horimetro_atual,status').eq('status','ativo')),
    safe(_supabase.from('bpf_ncs').select('id').eq('status','pendente')),
    safe(_supabase.from('abastecimento_bombas').select('nome,litros_atual,capacidade_litros,combustivel')),
  ]);
  // Cálculos
  const tSc=prod.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tHT=prod.reduce((s,l)=>s+(l.ht||0),0);
  const tHP=prod.reduce((s,l)=>s+(l.hp||0),0);
  const tLe=prod.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const disp=tHT>0?((tHT-tHP)/tHT*100):0;
  const mediaScH=(tHT-tHP)>0?tSc/(tHT-tHP):0;
  const palAp=pals.filter(p=>p.status==='aprovado').length;
  const palRp=pals.filter(p=>p.status==='reprovado').length;
  const palPd=pals.filter(p=>p.status==='pendente').length;
  const qual=(palAp+palRp)>0?(palAp/(palAp+palRp)*100):100;
  const tCusto=custos.reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const tKgExp=exp.reduce((s,o)=>s+(parseFloat(o.total_kg)||0),0);
  const tLiqP=port.reduce((s,v)=>s+(v.peso_liquido||0),0);
  const tBrutoP=port.reduce((s,v)=>s+(v.peso_bruto||0),0);
  const manutUrg=manut.filter(x=>x.prioridade==='urgente'&&!['concluida','cancelada'].includes(x.status)).length;
  const manutAtras=manut.filter(x=>x.data_prevista&&x.data_prevista<hoje&&!['concluida','cancelada'].includes(x.status)).length;
  const tHorasManut=manut.reduce((s,x)=>s+(x.horas_gastas||0),0);
  const almxZero=almx.filter(x=>(x.estoque_atual||0)<=0&&(x.estoque_minimo||0)>0).length;
  const almxBaixo=almx.filter(x=>(x.estoque_atual||0)>0&&(x.estoque_atual||0)<=(x.estoque_minimo||0)&&(x.estoque_minimo||0)>0).length;
  const epiVenc=epiEnt.filter(e=>e.data_prevista_troca&&e.data_prevista_troca<hoje).length;
  const epiProx=epiEnt.filter(e=>e.data_prevista_troca&&e.data_prevista_troca>=hoje&&e.data_prevista_troca<=em7).length;
  const expConcl=exp.filter(x=>x.status==='concluido').length;
  const expAtras=exp.filter(x=>x.data_prevista&&x.data_prevista<hoje&&!['concluido','cancelado'].includes(x.status)).length;
  const frotaVenc=frota.filter(v=>{if(v.tipo_revisao==='data')return v.proxima_revisao_data&&v.proxima_revisao_data<=hoje;return v.revisao_horas>0&&(v.horimetro_atual||0)>=(v.proxima_revisao||Infinity);}).length;
  // Por linha
  const porLn={};prod.forEach(l=>{if(!porLn[l.linha])porLn[l.linha]={sacos:0,ht:0,hp:0,n:0,lenha:0};porLn[l.linha].sacos+=l.total_sacos||0;porLn[l.linha].ht+=l.ht||0;porLn[l.linha].hp+=l.hp||0;porLn[l.linha].n++;porLn[l.linha].lenha+=l.consumo_lenha||0;});
  const porNat={};custos.forEach(l=>{const n=nats.find(x=>x.id===l.natureza_id);const nm=n?.nome||'Outros';porNat[nm]=(porNat[nm]||0)+(parseFloat(l.valor)||0);});
  const topNat=Object.entries(porNat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const porLnPal={};pals.forEach(p=>{const ln=p.linha||'—';if(!porLnPal[ln])porLnPal[ln]={a:0,r:0,p:0};if(p.status==='aprovado')porLnPal[ln].a++;else if(p.status==='reprovado')porLnPal[ln].r++;else porLnPal[ln].p++;});
  // Alertas
  const alertas=[];
  if(epiVenc)alertas.push({tipo:'danger',txt:`${epiVenc} EPI(s) com prazo VENCIDO`,sub:`${epiProx} a vencer em 7 dias`});
  if(almxZero)alertas.push({tipo:'danger',txt:`${almxZero} insumo(s) com estoque ZERADO`,sub:`${almxBaixo} abaixo do mínimo`});
  if(manutUrg)alertas.push({tipo:'danger',txt:`${manutUrg} OS urgente(s) em aberto`,sub:`${manutAtras} com prazo vencido`});
  if(palRp)alertas.push({tipo:'danger',txt:`${palRp} pallet(s) REPROVADO(S)`,sub:`${palPd} pendentes de análise`});
  if(expAtras)alertas.push({tipo:'danger',txt:`${expAtras} OE(s) de expedição atrasada(s)`,sub:`Total: ${exp.length} no período`});
  if(frotaVenc)alertas.push({tipo:'warn',txt:`${frotaVenc} veículo(s) com revisão vencida`,sub:''});
  if(bpfNcs.length)alertas.push({tipo:'warn',txt:`${bpfNcs.length} NC(s) do BPF pendente(s)`,sub:''});

  const kpis=`<div class="kpis">
    ${[['Sacos Produzidos',fmtN(tSc)],['H. Trabalhadas',fmtN(tHT,1)+'h'],['H. Paradas',fmtN(tHP,1)+'h'],
       ['Disponibilidade',disp.toFixed(1)+'%'],['Média sc/h',fmtN(mediaScH,1)],
       ['Qualidade Pallets',qual.toFixed(1)+'%'],['Consumo Lenha',fmtN(tLe,1)+' m³'],
       ['Total Expedido',fmtN(tKgExp,1)+' kg'],['Peso Líq. Portaria',fmtN(tLiqP,3)+' t'],
       ['OS de Manutenção',manut.length],['Horas de Manutenção',fmtN(tHorasManut,1)+'h'],
       ['Custo Total','R$ '+fmtN(tCusto,2)],['EPIs Vencidos',epiVenc],
       ['Insumos Zerados',almxZero],['Revisões Vencidas (Frota)',frotaVenc]]
      .map(([l,v])=>`<div class="kpi"><div class="kpi-v">${v}</div><div class="kpi-l">${l}</div></div>`).join('')}
  </div>`;

  const tab=`
    ${alertas.length?`<h3>⚠️ Alertas Críticos</h3>
    <table><thead><tr><th>Severidade</th><th>Descrição</th><th>Detalhe</th></tr></thead>
    <tbody>${alertas.map(a=>`<tr><td><span class="bd bd-${a.tipo}">${a.tipo==='danger'?'🔴 Urgente':'🟡 Atenção'}</span></td><td><strong>${a.txt}</strong></td><td>${a.sub||'—'}</td></tr>`).join('')}</tbody></table>`:''}

    <h3>Produção por Linha</h3>
    <table><thead><tr><th>Linha</th><th>Lanç.</th><th>Sacos</th><th>H.T</th><th>H.P</th><th>Disponib.</th><th>Média sc/h</th><th>Lenha m³</th><th>Part.%</th></tr></thead>
    <tbody>${Object.entries(porLn).sort((a,b)=>b[1].sacos-a[1].sacos).map(([ln,d])=>{
      const dp=d.ht>0?((d.ht-d.hp)/d.ht*100).toFixed(1):0;
      const msc=(d.ht-d.hp)>0?(d.sacos/(d.ht-d.hp)).toFixed(1):0;
      const part=tSc>0?(d.sacos/tSc*100).toFixed(1):0;
      return`<tr><td><strong>${ln}</strong></td><td>${d.n}</td><td><strong>${fmtN(d.sacos)}</strong></td>
        <td>${fmtN(d.ht,1)}h</td><td>${fmtN(d.hp,1)}h</td>
        <td><span class="bd bd-${parseFloat(dp)>=85?'ok':parseFloat(dp)>=70?'warn':'danger'}">${dp}%</span></td>
        <td>${msc}</td><td>${fmtN(d.lenha,1)}</td>
        <td><span class="bd bd-info">${part}%</span></td></tr>`;
    }).join('')||'<tr><td colspan="9" style="text-align:center;color:#94a3b8;">Sem lançamentos</td></tr>'}</tbody></table>

    <h3>Qualidade de Pallets por Linha</h3>
    <table><thead><tr><th>Linha</th><th>Aprovados</th><th>Reprovados</th><th>Pendentes</th><th>Total</th><th>Índice</th></tr></thead>
    <tbody>${Object.entries(porLnPal).map(([ln,d])=>{const tot=d.a+d.r+d.p;const q2=(d.a+d.r)>0?(d.a/(d.a+d.r)*100):100;
      return`<tr><td><strong>${ln}</strong></td><td style="color:#16a34a;font-weight:700;">${d.a}</td>
        <td style="color:${d.r>0?'#dc2626':'#94a3b8'};font-weight:700;">${d.r}</td><td>${d.p}</td><td>${tot}</td>
        <td><span class="bd bd-${q2>=95?'ok':q2>=85?'warn':'danger'}">${q2.toFixed(1)}%</span></td></tr>`;
    }).join('')||'<tr><td colspan="6" style="text-align:center;color:#94a3b8;">Sem dados</td></tr>'}</tbody></table>

    <h3>Manutenção — Ordens de Serviço</h3>
    <table><thead><tr><th>Equipamento</th><th>Linha</th><th>Prioridade</th><th>Status</th><th>Horas</th></tr></thead>
    <tbody>${manut.filter(o=>o.prioridade==='urgente'||!['concluida','cancelada'].includes(o.status)).slice(0,15).map(o=>{
      const prCls={urgente:'danger',alta:'warn',normal:'info',baixa:'ok'}[o.prioridade]||'info';
      const stCls={aberta:'warn',em_andamento:'info',concluida:'ok',cancelada:'info'}[o.status]||'info';
      return`<tr><td>${o.equipamento||'—'}</td><td>${o.linha||'—'}</td>
        <td><span class="bd bd-${prCls}">${o.prioridade}</span></td>
        <td><span class="bd bd-${stCls}">${o.status?.replace('_',' ')}</span></td>
        <td>${fmtN(o.horas_gastas,1)}h</td></tr>`;
    }).join('')||'<tr><td colspan="5" style="text-align:center;color:#94a3b8;">Sem OS</td></tr>'}</tbody></table>

    <h3>Custo por Natureza</h3>
    <table><thead><tr><th>Natureza</th><th>Valor</th><th>Participação</th></tr></thead>
    <tbody>${topNat.map(([n,v])=>`<tr><td><strong>${n}</strong></td>
      <td>R$ ${fmtN(v,2)}</td>
      <td>${tCusto>0?'<span class="bd bd-info">'+(v/tCusto*100).toFixed(1)+'%</span>':'—'}</td></tr>`).join('')
      ||'<tr><td colspan="3" style="text-align:center;color:#94a3b8;">Sem lançamentos</td></tr>'}</tbody></table>

    <h3>Almoxarifado — Situação Crítica</h3>
    <table><thead><tr><th>Insumo</th><th>Estoque Atual</th><th>Estoque Mínimo</th><th>Status</th></tr></thead>
    <tbody>${almx.filter(x=>(x.estoque_atual||0)<=(x.estoque_minimo||0)&&(x.estoque_minimo||0)>0).slice(0,15).map(i=>{
      const zero=(i.estoque_atual||0)<=0;
      return`<tr><td><strong>${i.nome}</strong></td>
        <td style="color:${zero?'#dc2626':'#b45309'};font-weight:700;">${fmtN(i.estoque_atual,2)}</td>
        <td>${fmtN(i.estoque_minimo,2)}</td>
        <td><span class="bd bd-${zero?'danger':'warn'}">${zero?'Zerado':'Baixo'}</span></td></tr>`;
    }).join('')||'<tr><td colspan="4" style="text-align:center;color:#16a34a;padding:10px;">✅ Sem alertas de estoque</td></tr>'}</tbody></table>`;

  abrirJanelaPDF(htmlPDFBase('Resumo Gerencial Completo',`${fmtD(ini)} a ${fmtD(fim)}`,kpis,tab,null,'landscape'));
}

/* ── CSV ESPECÍFICOS ── */
async function csvProducao(){
  if (!guardAction('relatorios', 'export')) return;
  const {ini,fim,linha,turno}=getPeriodo();
  let q=_supabase.from('producao').select('*').gte('data',ini).lte('data',fim).order('data');
  if(linha)q=q.eq('linha',linha); if(turno)q=q.eq('turno',turno);
  const rows=await safe(q);
  exportarCSV(['Data','Dia','Linha','Turno','Encarregado','Produto','H.T','H.P','Sacos','Efic.Disp','Efic.Prod','Lenha m³','Status'],
    rows.map(l=>[l.data,l.dia_semana||'—',l.linha,l.turno,l.encarregado||'—',(l.produtos_op&&l.produtos_op.length?l.produtos_op.map(p=>p.produto).join('|'):l.produto)||'—',l.ht||0,l.hp||0,l.total_sacos||0,l.efic_disp||'—',l.efic_prod||'—',l.consumo_lenha||0,l.status]),
    `producao_${ini}_${fim}`); toast('CSV exportado!','success');
}
async function csvProducaoLinha(){
  if (!guardAction('relatorios', 'export')) return;
  const rows=window._dadosExport||[];
  const lns={};
  rows.forEach(l=>{if(!lns[l.linha])lns[l.linha]={sacos:0,ht:0,hp:0,lancs:0};lns[l.linha].sacos+=l.total_sacos||0;lns[l.linha].ht+=l.ht||0;lns[l.linha].hp+=l.hp||0;lns[l.linha].lancs++;});
  exportarCSV(['Linha','Lançamentos','Sacos','H.T','H.P','Disponib.%'],
    Object.entries(lns).map(([ln,d])=>[ln,d.lancs,d.sacos,d.ht.toFixed(1),d.hp.toFixed(1),d.ht>0?((d.ht-d.hp)/d.ht*100).toFixed(1):'0']),
    'producao_por_linha'); toast('CSV exportado!','success');
}

async function csvEpi(){
  if (!guardAction('relatorios', 'export')) return;
  const hoje=new Date().toISOString().split('T')[0];
  const [entregas,funcs,epis]=await Promise.all([safe(_supabase.from('epi_entregas').select('*').order('data_entrega',{ascending:false})),safe(_supabase.from('funcionarios').select('id,nome,setor')),safe(_supabase.from('epi_cadastro').select('id,nome'))]);
  exportarCSV(['Funcionário','Setor','EPI','Data Entrega','Troca Prevista','Dias Restantes','Status'],
    entregas.map(e=>{const fn=funcs.find(x=>x.id===e.funcionario_id);const ep=epis.find(x=>x.id===e.epi_id);const dr=e.data_prevista_troca?Math.round((new Date(e.data_prevista_troca)-new Date(hoje))/86400000):null;return[fn?.nome||'—',fn?.setor||'—',ep?.nome||'—',fmtD(e.data_entrega),fmtD(e.data_prevista_troca),dr!=null?dr+'d':'—',dr===null?'—':dr<0?'Vencido':dr<=7?'Próximo':'Em dia'];}),
    'epi_entregas'); toast('CSV exportado!','success');
}
