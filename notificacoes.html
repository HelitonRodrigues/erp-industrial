<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Notificações</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<style>
/* ══════════════════════════════════════════
   CENTRAL DE NOTIFICAÇÕES
   ══════════════════════════════════════════ */

/* ── RESUMO KPI ── */
.notif-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.notif-kpi {
  background: #fff;
  border-radius: 14px;
  padding: 16px 18px;
  border: 1.5px solid #e2e8f0;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.notif-kpi:hover { box-shadow: 0 4px 16px rgba(4,45,77,.1); transform: translateY(-1px); }
.notif-kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kc, #e2e8f0);
  border-radius: 14px 14px 0 0;
}
.notif-kpi-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.notif-kpi-label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; }

/* ── BARRA FILTROS ── */
.filtro-bar {
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filtro-chip {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  font-size: 13px;
  font-weight: 600;
  color: #475569;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filtro-chip:hover { border-color: var(--primary); color: var(--primary); background: #f0f6ff; }
.filtro-chip.ativo { background: var(--primary); color: #fff; border-color: var(--primary); }
.chip-cnt {
  background: rgba(255,255,255,.3);
  color: inherit;
  font-size: 10px;
  font-weight: 800;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.filtro-chip.ativo .chip-cnt { background: rgba(255,255,255,.25); }
.chip-cnt.danger { background: #fee2e2; color: #dc2626; }

/* ── CONTROLES BARRA ── */
.controles-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.controles-left  { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.controles-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ── GRUPO DE MODULO ── */
.modulo-grupo { margin-bottom: 24px; }
.modulo-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid #f1f5f9;
}
.modulo-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.modulo-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--primary);
}
.modulo-cnt {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  background: #f1f5f9;
  color: #64748b;
}
.modulo-link {
  margin-left: auto;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 8px;
  border: 1px solid var(--primary);
  transition: all .15s;
}
.modulo-link:hover { background: var(--primary); color: #fff; }

/* ── NOTIF ITEM ── */
.notif-item {
  background: #fff;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  padding: 0;
  margin-bottom: 8px;
  overflow: hidden;
  transition: box-shadow .15s, border-color .15s;
  position: relative;
}
.notif-item:hover { box-shadow: 0 3px 14px rgba(4,45,77,.09); border-color: #cbd5e1; }
.notif-item.urgente { border-left: 5px solid #ef4444; }
.notif-item.aviso   { border-left: 5px solid #f59e0b; }
.notif-item.info    { border-left: 5px solid #2563eb; }
.notif-item.sucesso { border-left: 5px solid #22c55e; }
.notif-item.visto   { opacity: .72; }
.notif-item.concluido { opacity: .45; }

.notif-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
}
.notif-ico {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
}
.notif-ico.urgente { background: #fee2e2; }
.notif-ico.aviso   { background: #fef9c3; }
.notif-ico.info    { background: #eff6ff; }
.notif-ico.sucesso { background: #dcfce7; }

.notif-body { flex: 1; min-width: 0; }
.notif-titulo {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.notif-desc {
  font-size: 13px;
  color: #475569;
  line-height: 1.5;
  margin-bottom: 5px;
}
.notif-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.notif-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
}
.tag-urgente { background: #fee2e2; color: #dc2626; }
.tag-aviso   { background: #fef9c3; color: #b45309; }
.tag-info    { background: #eff6ff; color: #2563eb; }
.tag-sucesso { background: #dcfce7; color: #16a34a; }
.notif-ts    { font-size: 11px; color: #94a3b8; }
.notif-status-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
}
.sb-novo      { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.sb-visto     { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
.sb-concluido { background: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }

.notif-acoes {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
  padding-left: 8px;
}
.notif-btn {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  cursor: pointer;
  color: #475569;
  white-space: nowrap;
  transition: all .15s;
}
.notif-btn:hover       { background: #f1f5f9; border-color: #cbd5e1; color: var(--primary); }
.notif-btn.btn-verde   { background: #f0fdf4; border-color: #bbf7d0; color: #16a34a; }
.notif-btn.btn-verde:hover { background: #dcfce7; }
.notif-btn.btn-red     { background: #fff1f2; border-color: #fecdd3; color: #dc2626; }
.notif-btn.btn-red:hover   { background: #fee2e2; }

/* ── DETALHE (expansível) ── */
.notif-detalhe {
  display: none;
  padding: 0 16px 14px 68px;
  border-top: 1px solid #f1f5f9;
}
.notif-detalhe.aberto { display: block; }
.notif-detalhe-inner {
  background: #f8fafc;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px;
  color: #334155;
  line-height: 1.6;
}
.det-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.det-cell {
  background: #fff;
  border-radius: 8px;
  padding: 8px 10px;
  border: 1px solid #e2e8f0;
}
.det-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
.det-value { font-size: 13px; font-weight: 700; color: var(--primary); margin-top: 2px; }
.det-action {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 7px 14px;
  background: var(--primary);
  color: #fff;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  transition: opacity .15s;
  border: none;
  cursor: pointer;
}
.det-action:hover { opacity: .85; }

/* ── LOADING / EMPTY ── */
.notif-loading {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
}
.notif-empty {
  text-align: center;
  padding: 60px 20px;
  background: #fff;
  border-radius: 14px;
  border: 1.5px dashed #e2e8f0;
}
.notif-empty-icon { font-size: 40px; margin-bottom: 12px; }
.notif-empty-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.notif-empty-sub   { font-size: 13px; color: #94a3b8; }

/* ── PROGRESSBAR verificação ── */
.verificando-bar {
  height: 3px;
  background: #f1f5f9;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 20px;
}
.verificando-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width .3s;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .notif-acoes { flex-direction: column; }
  .notif-main  { flex-wrap: wrap; }
  .notif-detalhe { padding-left: 16px; }
  .controles-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<div id="sidebar-container"></div>

<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">🔔 Notificações</div>
  <div class="topbar-right">
    <span id="notif-clock" style="font-size:13px;color:#64748b;font-weight:500;"></span>
    <div class="topbar-user">
      <div class="user-avatar" style="width:34px;height:34px;font-size:13px;" id="top-avatar">SA</div>
      <div>
        <div class="topbar-user-name" id="top-user-name">Super Admin</div>
        <div class="topbar-user-profile" id="top-user-perfil">SADM</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#94a3b8;">Sair</button>
  </div>
</header>

<main class="main-content" id="main-content">

  <!-- CABEÇALHO -->
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="margin:0;font-size:24px;font-weight:800;color:var(--primary);">Central de Notificações</h1>
      <p style="margin:4px 0 0;font-size:14px;color:#94a3b8;font-weight:500;">Alertas e avisos de todos os módulos do sistema</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="verificarAlertas(true)" id="btn-verificar">🔄 Verificar Alertas</button>
      <button class="btn btn-secondary" onclick="marcarTodasVistas()">👁️ Marcar todas como vistas</button>
      <button class="btn btn-secondary" onclick="limparConcluidas()" style="color:#94a3b8;">🗑️ Limpar concluídas</button>
    </div>
  </div>

  <!-- BARRA DE PROGRESSO VERIFICAÇÃO -->
  <div class="verificando-bar" id="verificando-bar" style="display:none;">
    <div class="verificando-fill" id="verificando-fill" style="width:0%;"></div>
  </div>
  <div id="verificando-txt" style="font-size:12px;color:#94a3b8;text-align:center;margin-bottom:12px;display:none;"></div>

  <!-- KPIs -->
  <div class="notif-kpis" id="notif-kpis"></div>

  <!-- CHIPS DE FILTRO -->
  <div class="filtro-bar">
    <span style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;">Filtrar:</span>
    <button class="filtro-chip ativo" onclick="setFiltro('todos',this)" id="chip-todos">Todos <span class="chip-cnt" id="chip-cnt-todos">0</span></button>
    <button class="filtro-chip" onclick="setFiltro('novo',this)" id="chip-novo">🆕 Novos <span class="chip-cnt danger" id="chip-cnt-novo">0</span></button>
    <button class="filtro-chip" onclick="setFiltro('urgente',this)" id="chip-urgente">🔴 Urgentes <span class="chip-cnt" id="chip-cnt-urgente">0</span></button>
    <button class="filtro-chip" onclick="setFiltro('aviso',this)" id="chip-aviso">🟡 Avisos <span class="chip-cnt" id="chip-cnt-aviso">0</span></button>
    <button class="filtro-chip" onclick="setFiltro('info',this)" id="chip-info">ℹ️ Info <span class="chip-cnt" id="chip-cnt-info">0</span></button>
    <button class="filtro-chip" onclick="setFiltro('visto',this)">👁️ Vistos</button>
    <button class="filtro-chip" onclick="setFiltro('concluido',this)">✅ Concluídos</button>
    <div style="margin-left:auto;">
      <select id="filtro-modulo" class="form-input" style="width:175px;font-size:13px;" onchange="renderLista()">
        <option value="">Todos os módulos</option>
        <option value="producao">⚙️ Produção</option>
        <option value="laboratorio">🧪 Laboratório</option>
        <option value="manutencao">🔧 Manutenção</option>
        <option value="almoxarifado">📦 Almoxarifado</option>
        <option value="epi">🦺 EPI</option>
        <option value="portaria">🚛 Portaria</option>
        <option value="expedicao">📤 Expedição</option>
        <option value="frota">🚗 Frota</option>
        <option value="abastecimento">⛽ Abastecimento</option>
        <option value="bpf">📋 BPF</option>
        <option value="rh">👥 RH</option>
        <option value="equipamentos">⚙️ Equipamentos</option>
      </select>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="controles-bar">
    <div class="controles-left">
      <span style="font-size:13px;color:#64748b;font-weight:600;" id="contagem-txt">— notificações</span>
    </div>
    <div class="controles-right">
      <span style="font-size:12px;color:#94a3b8;" id="ultima-atualizacao">—</span>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#64748b;cursor:pointer;">
        <input type="checkbox" id="agrupar-modulo" checked onchange="renderLista()" style="accent-color:var(--primary);">
        Agrupar por módulo
      </label>
    </div>
  </div>

  <!-- ÁREA PRINCIPAL -->
  <div id="notif-loading" class="notif-loading">
    <div class="spin" style="width:40px;height:40px;border-width:3px;margin:0 auto 16px;"></div>
    <div style="font-size:15px;font-weight:600;">Verificando alertas do sistema...</div>
  </div>
  <div id="notif-area" style="display:none;"></div>

</main>

<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════════════════
   ESTADO GLOBAL
   ═══════════════════════════════════════════════════════ */
let _notifs   = [];  // todas as notificações (da tabela + geradas)
let _filtro   = 'todos';
let _abertos  = new Set(); // ids com detalhe aberto

const MODULOS = {
  producao:      { icon:'⚙️', label:'Produção',      bg:'#eff6ff', href:'producao.html' },
  laboratorio:   { icon:'🧪', label:'Laboratório',   bg:'#f0fdf4', href:'laboratorio.html' },
  manutencao:    { icon:'🔧', label:'Manutenção',    bg:'#fef9c3', href:'manutencao.html' },
  almoxarifado:  { icon:'📦', label:'Almoxarifado',  bg:'#fff7ed', href:'almoxarifado.html' },
  epi:           { icon:'🦺', label:'EPI',           bg:'#fdf4ff', href:'epi.html' },
  portaria:      { icon:'🚛', label:'Portaria',      bg:'#f0fdf4', href:'portaria.html' },
  expedicao:     { icon:'📤', label:'Expedição',     bg:'#eff6ff', href:'expedicao.html' },
  frota:         { icon:'🚗', label:'Frota',         bg:'#fff7ed', href:'frota.html' },
  abastecimento: { icon:'⛽', label:'Abastecimento', bg:'#fefce8', href:'abastecimento.html' },
  bpf:           { icon:'📋', label:'BPF',           bg:'#f8fafc', href:'bpf.html' },
  rh:            { icon:'👥', label:'RH',            bg:'#fdf4ff', href:'rh.html' },
  equipamentos:  { icon:'⚙️', label:'Equipamentos',  bg:'#f8fafc', href:'equip-gerais.html' },
  compras:       { icon:'🛒', label:'Compras',       bg:'#fff7ed', href:'compras.html' },
  carregamento:  { icon:'📦', label:'Carregamento',  bg:'#f0fdf4', href:'carregamento.html' },
  terceiros:     { icon:'🤝', label:'Terceiros',     bg:'#faf5ff', href:'terceiros.html' },
  sistema:       { icon:'⚙️', label:'Sistema',       bg:'#f8fafc', href:'#' },
};

/* ═══════════════════════════════════════════════════════
   SETUP
   ═══════════════════════════════════════════════════════ */
fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML = html;
  document.querySelector('[href="notificacoes.html"]')?.classList.add('active');
  openGroup('principal');
  initSidebar('notificacoes.html');
});

setInterval(()=>{
  document.getElementById('notif-clock').textContent =
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

async function init(){
  await carregarSalvas();
  await verificarAlertas(false);
}

/* ═══════════════════════════════════════════════════════
   CARREGAR NOTIFICAÇÕES SALVAS
   ═══════════════════════════════════════════════════════ */
async function carregarSalvas(){
  try{
    const {data} = await _supabase
      .from('notificacoes')
      .select('*')
      .order('created_at',{ascending:false})
      .limit(500);
    _notifs = data || [];
  } catch(e){ _notifs = []; }
}

/* ═══════════════════════════════════════════════════════
   VERIFICAR ALERTAS — todos os módulos
   ═══════════════════════════════════════════════════════ */
async function verificarAlertas(mostrarProgresso = true){
  const btn = document.getElementById('btn-verificar');
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spin" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px;"></span>Verificando...'; }

  const barra  = document.getElementById('verificando-bar');
  const fill   = document.getElementById('verificando-fill');
  const txt    = document.getElementById('verificando-txt');
  if(mostrarProgresso){ barra.style.display='block'; txt.style.display='block'; }

  const hoje    = new Date().toISOString().split('T')[0];
  const em7dias = new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const novosGerados = [];

  async function passo(pct, label, fn){
    if(mostrarProgresso){ fill.style.width = pct+'%'; txt.textContent = label; }
    try{ await fn(novosGerados, hoje, em7dias); } catch(e){ console.warn(label, e); }
  }

  // ── 01 PRODUÇÃO ──────────────────────────────────────
  await passo(6, '⚙️ Verificando Produção...', async(out)=>{
    const mes = new Date().toISOString().slice(0,7);
    const {data:lancs} = await _supabase.from('producao').select('id,linha,status,data,turno').gte('data',mes+'-01').lte('data',mes+'-31');
    const l = lancs||[];
    const reprovados = l.filter(x=>x.status==='reprovado');
    const emAnalise  = l.filter(x=>x.status==='em_analise');
    // Sem lançamento hoje por linha
    const {data:linhas} = await _supabase.from('linhas_producao').select('nome').eq('status','ativo');
    const hoje_ = new Date().toISOString().split('T')[0];
    const linhasHoje = new Set(l.filter(x=>x.data===hoje_).map(x=>x.linha));
    (linhas||[]).forEach(ln=>{
      if(!linhasHoje.has(ln.nome))
        out.push({tipo:'aviso',modulo:'producao',titulo:'Sem lançamento hoje',
          descricao:`Linha ${ln.nome} não possui lançamento registrado hoje (${fmtData(hoje_)}).`,
          detalhe:JSON.stringify({linha:ln.nome,data:hoje_}),chave:`prod_sem_lanc_${ln.nome}_${hoje_}`});
    });
    if(reprovados.length)
      out.push({tipo:'urgente',modulo:'producao',titulo:'Lançamentos reprovados',
        descricao:`${reprovados.length} lançamento(s) com status REPROVADO no mês atual.`,
        detalhe:JSON.stringify({quantidade:reprovados.length,linhas:[...new Set(reprovados.map(x=>x.linha))].join(', ')}),
        chave:`prod_reprovados_${mes}`});
    if(emAnalise.length)
      out.push({tipo:'aviso',modulo:'producao',titulo:'Lançamentos em análise',
        descricao:`${emAnalise.length} lançamento(s) aguardando aprovação do laboratório.`,

    if(antigos.length)
      out.push({tipo:'aviso',modulo:'terceiros',titulo:'Serviços de terceiros em aberto há mais de 15 dias',
        descricao:`${antigos.length} serviço(s) de terceiros em aberto sem fechamento há mais de 15 dias.`,
        detalhe:JSON.stringify({quantidade:antigos.length}),chave:`terc_antigos_${hoje}`});
  });

  fill.style.width = '100%';

  // ── SALVAR NOVOS — recarregar banco antes de comparar (fonte única de verdade) ──
  await carregarSalvas();

  const chavesExistentes  = new Set(_notifs.map(n=>n.chave).filter(Boolean));
  const titulosExistentes = new Set(_notifs.map(n=>n.titulo+'|'+n.modulo));
  // Deduplica por chave (se coluna existir) ou por titulo+modulo (fallback)
  const paraInserir = novosGerados.filter(n=>{
    if(n.chave && chavesExistentes.has(n.chave)) return false;
    if(!n.chave && titulosExistentes.has(n.titulo+'|'+n.modulo)) return false;
    return true;
  });

  let inseridos = 0;

  for(const n of paraInserir){
    const payload = {
      tipo:         n.tipo,
      modulo:       n.modulo,
      titulo:       n.titulo,
      descricao:    n.descricao,
      status_notif: 'novo',
      created_at:   new Date().toISOString(),
    };
    let ok = false;
    // Tentativa completa (com chave + detalhe)
    try{
      const {data:ins, error} = await _supabase
        .from('notificacoes')
        .insert({...payload, chave:n.chave||null, detalhe:n.detalhe||null})
        .select('id').single();
      if(!error && ins){ inseridos++; ok = true; }
    }catch(e){}
    // Fallback sem colunas extras caso a tabela não as tenha
    if(!ok){
      try{
        const {data:ins2, error:e2} = await _supabase
          .from('notificacoes')
          .insert(payload)
          .select('id').single();
        if(!e2 && ins2) inseridos++;
      }catch(e){}
    }
  }

  // Limpar concluídas com mais de 48h
  const limite = new Date(Date.now()-48*3600000).toISOString();
  try{
    await _supabase.from('notificacoes').delete()
      .eq('status_notif','concluido').lt('created_at',limite);
  }catch(e){}

  // Única recarga após todos os inserts — contagem sempre reflete o banco real
  await carregarSalvas();
  atualizarContadores();
  renderLista();

  if(mostrarProgresso){
    setTimeout(()=>{ barra.style.display='none'; txt.style.display='none'; },800);
  } else {
    barra.style.display='none'; txt.style.display='none';
  }

  document.getElementById('ultima-atualizacao').textContent =
    'Atualizado: ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('notif-loading').style.display = 'none';
  document.getElementById('notif-area').style.display    = 'block';

  if(btn){ btn.disabled=false; btn.innerHTML='🔄 Verificar Alertas'; }
  // Toast conta apenas o que foi realmente inserido no banco
  if(inseridos > 0) toast(`${inseridos} novo(s) alerta(s) detectado(s)!`,'warning');
}

/* ═══════════════════════════════════════════════════════
   CONTADORES
   ═══════════════════════════════════════════════════════ */
function atualizarContadores(){
  const novos    = _notifs.filter(n=>n.status_notif==='novo'||!n.status_notif).length;
  const urgentes = _notifs.filter(n=>n.tipo==='urgente').length;
  const avisos   = _notifs.filter(n=>n.tipo==='aviso').length;
  const infos    = _notifs.filter(n=>n.tipo==='info').length;
  const vistos   = _notifs.filter(n=>n.status_notif==='visto').length;
  const concl    = _notifs.filter(n=>n.status_notif==='concluido').length;

  document.getElementById('chip-cnt-todos').textContent   = _notifs.length;
  document.getElementById('chip-cnt-novo').textContent    = novos;
  document.getElementById('chip-cnt-urgente').textContent = urgentes;
  document.getElementById('chip-cnt-aviso').textContent   = avisos;
  document.getElementById('chip-cnt-info').textContent    = infos;

  document.getElementById('notif-kpis').innerHTML = [
    {label:'Novos',     value:novos,    cor:'#7c3aed', kc:'#7c3aed', filtro:'novo'},
    {label:'Urgentes',  value:urgentes, cor:'#dc2626', kc:'#ef4444', filtro:'urgente'},
    {label:'Avisos',    value:avisos,   cor:'#b45309', kc:'#f59e0b', filtro:'aviso'},
    {label:'Informativos',value:infos,  cor:'#2563eb', kc:'#2563eb', filtro:'info'},
    {label:'Vistos',    value:vistos,   cor:'#64748b', kc:'#94a3b8', filtro:'visto'},
    {label:'Concluídos',value:concl,    cor:'#16a34a', kc:'#22c55e', filtro:'concluido'},
  ].map(k=>`
    <div class="notif-kpi" style="--kc:${k.kc};" onclick="setFiltro('${k.filtro}',null)">
      <div class="notif-kpi-value" style="color:${k.cor};">${k.value}</div>
      <div class="notif-kpi-label">${k.label}</div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════
   FILTRO
   ═══════════════════════════════════════════════════════ */
function setFiltro(f, btn){
  _filtro = f;
  document.querySelectorAll('.filtro-chip').forEach(c=>c.classList.remove('ativo'));
  if(btn) btn.classList.add('ativo');
  renderLista();
}

/* ═══════════════════════════════════════════════════════
   RENDER LISTA
   ═══════════════════════════════════════════════════════ */
function renderLista(){
  const modulo   = document.getElementById('filtro-modulo').value;
  const agrupar  = document.getElementById('agrupar-modulo').checked;
  const area     = document.getElementById('notif-area');

  let lista = [..._notifs];

  // Filtro de status
  if(_filtro==='novo')      lista = lista.filter(n=>n.status_notif==='novo'||!n.status_notif);
  else if(_filtro==='visto')     lista = lista.filter(n=>n.status_notif==='visto');
  else if(_filtro==='concluido') lista = lista.filter(n=>n.status_notif==='concluido');
  else if(_filtro==='urgente')   lista = lista.filter(n=>n.tipo==='urgente');
  else if(_filtro==='aviso')     lista = lista.filter(n=>n.tipo==='aviso');
  else if(_filtro==='info')      lista = lista.filter(n=>n.tipo==='info');

  // Filtro de módulo
  if(modulo) lista = lista.filter(n=>n.modulo===modulo);

  // Ordenação: novo > urgente > aviso > info, depois data desc
  const ordTipo = {urgente:0,aviso:1,info:2,sucesso:3};
  const ordSt   = {novo:0,visto:1,concluido:2};
  lista.sort((a,b)=>{
    const sa=(ordSt[a.status_notif]??0), sb=(ordSt[b.status_notif]??0);
    if(sa!==sb) return sa-sb;
    const ta=(ordTipo[a.tipo]??3), tb=(ordTipo[b.tipo]??3);
    if(ta!==tb) return ta-tb;
    return (b.created_at||'').localeCompare(a.created_at||'');
  });

  document.getElementById('contagem-txt').textContent = `${lista.length} notificação(ões)`;

  if(!lista.length){
    area.innerHTML = `<div class="notif-empty">
      <div class="notif-empty-icon">✅</div>
      <div class="notif-empty-title">Nenhuma notificação</div>
      <div class="notif-empty-sub">O sistema está sem alertas para o filtro selecionado.</div>
    </div>`;
    return;
  }

  if(agrupar){
    // Agrupar por módulo
    const grupos = {};
    lista.forEach(n=>{
      const m = n.modulo||'sistema';
      if(!grupos[m]) grupos[m]=[];
      grupos[m].push(n);
    });
    area.innerHTML = Object.entries(grupos).map(([mod, itens])=>{
      const cfg = MODULOS[mod]||MODULOS.sistema;
      return `<div class="modulo-grupo">
        <div class="modulo-header">
          <div class="modulo-icon" style="background:${cfg.bg};">${cfg.icon}</div>
          <span class="modulo-title">${cfg.label}</span>
          <span class="modulo-cnt">${itens.length}</span>
          <a class="modulo-link" href="${cfg.href}">Abrir módulo →</a>
        </div>
        ${itens.map(n=>renderItem(n)).join('')}
      </div>`;
    }).join('');
  } else {
    area.innerHTML = lista.map(n=>renderItem(n)).join('');
  }

  // Re-aplicar abertos
  _abertos.forEach(id=>{
    const el = document.getElementById(`det-${id}`);
    if(el) el.classList.add('aberto');
  });
}

/* ── RENDER ITEM ── */
function renderItem(n){
  const tipo = n.tipo||'info';
  const sn   = n.status_notif||'novo';
  const cfg  = MODULOS[n.modulo||'sistema']||MODULOS.sistema;
  const ts   = n.created_at?new Date(n.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';

  const tagCls  = {urgente:'tag-urgente',aviso:'tag-aviso',info:'tag-info',sucesso:'tag-sucesso'}[tipo]||'tag-info';
  const tagTxt  = {urgente:'🔴 Urgente',aviso:'🟡 Aviso',info:'ℹ️ Info',sucesso:'✅ OK'}[tipo]||tipo;
  const snCls   = {novo:'sb-novo',visto:'sb-visto',concluido:'sb-concluido'}[sn]||'sb-novo';
  const snTxt   = {novo:'🆕 Novo',visto:'👁️ Visto',concluido:'✅ Concluído'}[sn]||'Novo';

  // Botões de ação
  const btnVisto = sn==='novo'
    ? `<button class="notif-btn" onclick="event.stopPropagation();marcarVisto('${n.id}')" title="Marcar como visto">👁️ Visto</button>`
    : '';
  const btnConcl = sn!=='concluido'
    ? `<button class="notif-btn btn-verde" onclick="event.stopPropagation();marcarConcluido('${n.id}')" title="Concluir">✅ Concluir</button>`
    : '';
  const btnDel = `<button class="notif-btn btn-red" onclick="event.stopPropagation();excluir('${n.id}')" title="Excluir">🗑️</button>`;

  // Detalhe expandido
  let detalheHtml = '';
  if(n.detalhe){
    try{
      const d = JSON.parse(n.detalhe);
      const cells = Object.entries(d).filter(([k])=>!['chave'].includes(k)).map(([k,v])=>{
        const val = Array.isArray(v)?v.join(', '):(typeof v==='object'&&v?JSON.stringify(v):String(v??'—'));
        return `<div class="det-cell"><div class="det-label">${k}</div><div class="det-value" style="font-size:12px;">${val}</div></div>`;
      }).join('');
      detalheHtml = `<div class="det-grid">${cells}</div>`;
    }catch(e){}
  }

  return `<div class="notif-item ${tipo} ${sn}" id="ni-${n.id}">
    <div class="notif-main" onclick="toggleDetalhe('${n.id}')">
      <div class="notif-ico ${tipo}">${cfg.icon}</div>
      <div class="notif-body">
        <div class="notif-titulo">${n.titulo||'—'}</div>
        <div class="notif-desc">${n.descricao||'—'}</div>
        <div class="notif-meta">
          <span class="notif-tag ${tagCls}">${tagTxt}</span>
          <span class="notif-status-badge ${snCls}">${snTxt}</span>
          <span class="notif-ts">📅 ${ts}</span>
          <span style="font-size:11px;color:#94a3b8;">${cfg.label}</span>
        </div>
      </div>
      <div class="notif-acoes" onclick="event.stopPropagation()">
        ${btnVisto}
        ${btnConcl}
        ${btnDel}
      </div>
    </div>
    <div class="notif-detalhe" id="det-${n.id}">
      <div class="notif-detalhe-inner">
        <div style="font-size:13px;color:#334155;margin-bottom:8px;">${n.descricao||''}</div>
        ${detalheHtml}
        <a class="det-action" href="${cfg.href}">Ir para ${cfg.label} →</a>
      </div>
    </div>
  </div>`;
}

function toggleDetalhe(id){
  const el = document.getElementById(`det-${id}`);
  if(!el) return;
  if(el.classList.contains('aberto')){
    el.classList.remove('aberto'); _abertos.delete(id);
  } else {
    el.classList.add('aberto'); _abertos.add(id);
    // Marcar como visto ao abrir
    const n = _notifs.find(x=>x.id===id);
    if(n && (n.status_notif==='novo'||!n.status_notif)) marcarVisto(id, false);
  }
}

/* ═══════════════════════════════════════════════════════
   AÇÕES
   ═══════════════════════════════════════════════════════ */
async function marcarVisto(id, rerender=true){
  try{ await _supabase.from('notificacoes').update({status_notif:'visto'}).eq('id',id); }catch(e){}
  const n = _notifs.find(x=>x.id===id);
  if(n) n.status_notif = 'visto';
  if(rerender){ atualizarContadores(); renderLista(); }
}

async function marcarConcluido(id){
  try{ await _supabase.from('notificacoes').update({status_notif:'concluido'}).eq('id',id); }catch(e){}
  const n = _notifs.find(x=>x.id===id);
  if(n) n.status_notif = 'concluido';
  atualizarContadores(); renderLista();
  toast('Notificação concluída.','success');
}

async function excluir(id){
  if (!guardAction('notificacoes', 'delete')) return;
  try{ await _supabase.from('notificacoes').delete().eq('id',id); }catch(e){}
  _notifs = _notifs.filter(x=>x.id!==id);
  _abertos.delete(id);
  atualizarContadores(); renderLista();
}

async function marcarTodasVistas(){
  try{ await _supabase.from('notificacoes').update({status_notif:'visto'}).eq('status_notif','novo'); }catch(e){}
  _notifs.filter(n=>n.status_notif==='novo'||!n.status_notif).forEach(n=>n.status_notif='visto');
  atualizarContadores(); renderLista();
  toast('Todas marcadas como vistas.','success');
}

async function limparConcluidas(){
  try{ await _supabase.from('notificacoes').delete().eq('status_notif','concluido'); }catch(e){}
  _notifs = _notifs.filter(n=>n.status_notif!=='concluido');
  atualizarContadores(); renderLista();
  toast('Notificações concluídas removidas.','success');
}

/* ── UTILITÁRIOS ── */
function fmtData(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—'; }

/* ── AUTO-REFRESH ── */
setInterval(()=>verificarAlertas(false), 10*60*1000);

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else { init(); }
</script>
