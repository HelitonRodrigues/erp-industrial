<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Diagnóstico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body style="font-family:monospace;padding:20px;">
<h2>🔍 Diagnóstico ERP</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');
const log = (msg, cor) => {
  out.innerHTML += `<div style="padding:6px;margin:4px;background:${cor||'#f0f0f0'};border-radius:4px;">${msg}</div>`;
};

async function run(){
  log('URL: ' + SUPABASE_URL, '#dbeafe');
  log('KEY: ' + SUPABASE_KEY.substring(0,30)+'...', '#dbeafe');
  
  const tabelas = ['equipamentos_linhas','equipamentos_gerais','linhas_producao','manutencao','frota_veiculos','funcionarios'];
  
  for(const t of tabelas){
    try{
      const {data, error} = await _supabase.from(t).select('id').limit(1);
      if(error) log(`❌ ${t}: ${error.message}`, '#fee2e2');
      else log(`✅ ${t}: OK (${data?.length ?? 0} rows)`, '#dcfce7');
    }catch(e){
      log(`💥 ${t}: ${e.message}`, '#fef9c3');
    }
  }
}
run();
</script>
</body>
</html>
