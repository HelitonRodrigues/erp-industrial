<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rastreabilidade — Pallet</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
:root{--primary:#042D4D;--accent:#C9FF64;--bg:#FAFDFF;--text:#032036;--border:#e2e8f0;--muted:#64748b;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);padding:16px;}
.wrap{max-width:760px;margin:0 auto;}
.head{display:flex;align-items:center;gap:14px;background:var(--primary);color:#fff;border-radius:16px;padding:16px 20px;margin-bottom:16px;}
.logo{width:50px;height:50px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--primary);overflow:hidden;flex-shrink:0;}
.head h1{font-size:17px;font-weight:800;}
.head p{font-size:12px;opacity:.85;margin-top:2px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.sec-title{font-size:12px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
.meta{background:#f8fafc;border-radius:8px;padding:9px 11px;border-left:3px solid var(--primary);}
.meta .l{font-size:9px;color:#94a3b8;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.meta .v{font-size:14px;font-weight:700;color:var(--primary);margin-top:2px;word-break:break-word;}
.pal-title{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.pal-cod{font-size:20px;font-weight:800;color:var(--primary);font-family:monospace;letter-spacing:.5px;}
.badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11px;font-weight:800;}
.b-ok{background:#dcfce7;color:#166534;}.b-pend{background:#fef3c7;color:#92400e;}.b-rej{background:#fee2e2;color:#991b1b;}.b-info{background:#dbeafe;color:#1e40af;}.b-gray{background:#f1f5f9;color:#475569;}
.analise-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;color:#334155;white-space:pre-wrap;}
table{width:100%;border-collapse:collapse;}
th{background:var(--primary);color:var(--accent);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top;}
tr:nth-child(even) td{background:#f8fafc;}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.loading,.err{text-align:center;padding:46px 20px;color:var(--muted);}
.err{color:var(--warning);}
.btn-print{background:var(--primary);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
@media print{.no-print{display:none;}body{padding:0;}.head{border-radius:0;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo" id="logo">🏭</div>
    <div style="flex:1;"><h1 id="empresa">Rastreabilidade de Pallet</h1><p id="sub">Consulta pública — sem necessidade de login</p></div>
    <button class="btn-print no-print" onclick="window.print()">🖨️</button>
  </div>
  <div id="conteudo"><div class="loading">Carregando informações…</div></div>
  <div class="foot">Documento gerado pelo ERP Industrial · <span id="ts"></span></div>
</div>

<script>
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtData(d){if(!d)return '—';try{return new Date((''+d).length<=10?d+'T12:00':d).toLocaleDateString('pt-BR');}catch(e){return d;}}
function fmtDataHora(d){if(!d)return '—';try{return new Date(d).toLocaleString('pt-BR');}catch(e){return d;}}
function palCodigo(p){if(p.codigo)return p.codigo;const lin=(p.linha||'').replace(/[^A-Za-z0-9]/g,'').substring(0,3).toUpperCase()||'LIN';const dt=(p.data||'').replace(/-/g,'');const op=(p.producao&&p.producao.op_numero)?String(p.producao.op_numero).split('-').pop():'0000';return `${lin}-${dt}-${op}-P${String(p.numero||0).padStart(3,'0')}`;}
function poMatch(p){const po=p.producao&&p.producao.produtos_op;if(Array.isArray(po))return po.find(x=>x.produto===p.produto)||po[0]||{};return {};}
function loteDe(p){const m=poMatch(p);return m.lote||p.lote||(p.producao&&p.producao.lote_mp)||'—';}
// Validade fixa (não depende do cadastro de produtos, que nem sempre tem
// validade_dias preenchido): 3 anos (1095 dias) para produtos com ficha
// técnica regulatória (25kg/bigbag/granel/Caulim), 2 anos (730 dias) para
// os demais — mesma regra usada na emissão do rótulo em aferidor.html.
function isFichaPallet(p){
  const linhaProd=poMatch(p).linha_produto||'';
  const lp=linhaProd.toLowerCase().replace(/\s/g,'');
  return lp.includes('25kg')||lp.includes('bag')||lp.includes('granel')||lp.includes('granl')||lp.includes('bigbag');
}
function validadeDe(p){
  const dias=isFichaPallet(p)?1095:730;
  const base=p.data?new Date(((''+p.data).length<=10?p.data+'T12:00':p.data)):null;
  if(!base||isNaN(base.getTime()))return '—';
  base.setDate(base.getDate()+dias);
  return base.toLocaleDateString('pt-BR');
}
function turnoDe(p){return p.turno||(p.producao&&p.producao.turno)||'—';}
function encarregadoDe(p){return (p.producao&&p.producao.encarregado)||p.encarregado||'—';}
function equipeDe(p){const eq=p.equipe||(p.producao&&p.producao.equipe);if(Array.isArray(eq))return eq.length?eq.join(', '):'—';return eq||'—';}
function statusBadge(p){const s=p.status||'pendente';if(s==='aprovado')return '<span class="badge b-ok">✓ Aprovado</span>';if(s==='reprovado')return '<span class="badge b-rej">✕ Reprovado</span>';return '<span class="badge b-pend">⏳ Aguardando análise</span>';}
function analiseTxt(p){if(!p.analise)return '';if(typeof p.analise==='string')return p.analise;try{return JSON.stringify(p.analise,null,2);}catch(e){return String(p.analise);}}

const SEL='*,producao(op_numero,produtos_op,encarregado,equipe,turno,data,lote_mp)';

async function carregarEmpresa(){
  try{const{data}=await _supabase.from('empresa_config').select('nome_fantasia,razao_social,logo').limit(1).maybeSingle();
    if(data){document.getElementById('empresa').textContent=data.nome_fantasia||data.razao_social||'Rastreabilidade de Pallet';if(data.logo)document.getElementById('logo').innerHTML=`<img src="${data.logo}" style="width:100%;height:100%;object-fit:cover;">`;}}catch(e){}
}

async function buscarPalletPorCodigo(cod){
  // 1) por código salvo
  let pallets=[];
  try{const{data}=await _supabase.from('producao_pallets').select(SEL).eq('codigo',cod);pallets=data||[];}catch(e){}
  if(pallets.length)return pallets[0];
  // 2) parse do código: PREFIXO-AAAAMMDD-OPTAIL-P###  -> busca por data+numero e confere o código calculado
  const m=/^(.+)-(\d{8})-(.+)-P(\d+)$/i.exec(cod);
  if(m){
    const data2=`${m[2].slice(0,4)}-${m[2].slice(4,6)}-${m[2].slice(6,8)}`;const numero=parseInt(m[4]);
    try{const{data}=await _supabase.from('producao_pallets').select(SEL).eq('data',data2).eq('numero',numero);
      const cand=(data||[]).filter(p=>palCodigo(p).toLowerCase()===cod.toLowerCase());
      if(cand.length)return cand[0];
      if((data||[]).length===1)return data[0];
    }catch(e){}
  }
  return null;
}

function renderPallet(p,carr){
  const carregado=(p.estoque_status==='carregado'||p.estoque_status==='expedido');
  const an=analiseTxt(p);
  let carrSec;
  if(carregado){
    carrSec=`<div class="card"><div class="sec-title">🚛 Carregamento</div><div class="meta-grid">
      <div class="meta"><div class="l">Situação</div><div class="v">${p.estoque_status==='expedido'?'Expedido':'Carregado'}</div></div>
      <div class="meta"><div class="l">Data / Hora</div><div class="v">${fmtDataHora(p.carregado_em)}</div></div>
      <div class="meta"><div class="l">Ordem de carga</div><div class="v">${esc(p.ordem_numero||'—')}</div></div>
      <div class="meta"><div class="l">Cliente destino</div><div class="v">${esc(p.cliente_dest||'—')}</div></div>
      <div class="meta"><div class="l">Transportadora</div><div class="v">${esc((carr&&carr.transportadora)||'—')}</div></div>
      <div class="meta"><div class="l">Placa</div><div class="v">${esc((carr&&carr.placa)||'—')}</div></div>
      <div class="meta"><div class="l">Motorista</div><div class="v">${esc((carr&&carr.motorista)||'—')}</div></div>
    </div></div>`;
  }else{
    carrSec=`<div class="card"><div class="sec-title">🚛 Carregamento</div><p style="font-size:13px;color:var(--muted);">Este pallet ainda está <b>em estoque</b> (não carregado).</p></div>`;
  }
  return `
    <div class="card">
      <div class="pal-title"><div><div style="font-size:11px;color:#94a3b8;font-weight:800;text-transform:uppercase;">Código do Pallet</div><div class="pal-cod">${esc(palCodigo(p))}</div></div>${statusBadge(p)}</div>
      <div style="font-size:15px;font-weight:800;color:var(--primary);">📦 ${esc(p.produto||'—')}</div>
    </div>
    <div class="card"><div class="sec-title">🏭 Produção</div><div class="meta-grid">
      <div class="meta"><div class="l">Data de fabricação</div><div class="v">${fmtData(p.data)}</div></div>
      <div class="meta"><div class="l">Registrado em</div><div class="v">${p.created_at?fmtDataHora(p.created_at):'—'}</div></div>
      <div class="meta"><div class="l">Turno / Horário</div><div class="v">${esc(turnoDe(p))}</div></div>
      <div class="meta"><div class="l">Linha de produção</div><div class="v">${esc(p.linha||'—')}</div></div>
      <div class="meta"><div class="l">OP</div><div class="v">${esc((p.producao&&p.producao.op_numero)||'—')}</div></div>
      <div class="meta"><div class="l">Encarregado</div><div class="v">${esc(encarregadoDe(p))}</div></div>
      <div class="meta"><div class="l">Equipe</div><div class="v">${esc(equipeDe(p))}</div></div>
      <div class="meta"><div class="l">Lote</div><div class="v">${esc(loteDe(p))}</div></div>
      <div class="meta"><div class="l">Validade</div><div class="v">${validadeDe(p)}</div></div>
    </div></div>
    <div class="card"><div class="sec-title">🧪 Qualidade / Aprovação</div>
      <div style="margin-bottom:${an?'10px':'0'};">${statusBadge(p)}</div>
      ${an?`<div class="analise-box">${esc(an)}</div>`:'<p style="font-size:13px;color:var(--muted);">Sem detalhes de análise registrados.</p>'}
    </div>
    ${carrSec}`;
}

function renderOrdem(ordem,pallets){
  const carregadoEm=pallets.map(p=>p.carregado_em).filter(Boolean).sort()[0];
  let html=`<div class="card"><div class="meta-grid">
    <div class="meta"><div class="l">Ordem de Carregamento</div><div class="v">${esc(ordem)}</div></div>
    <div class="meta"><div class="l">Pallets</div><div class="v">${pallets.length}</div></div>
    <div class="meta"><div class="l">Carregado em</div><div class="v">${fmtDataHora(carregadoEm)}</div></div>
    <div class="meta"><div class="l">Produtos</div><div class="v">${[...new Set(pallets.map(p=>p.produto))].map(esc).join(', ')}</div></div>
  </div></div>`;
  const porCli={};pallets.forEach(p=>{const c=p.cliente_dest||'Sem cliente';(porCli[c]=porCli[c]||[]).push(p);});
  Object.keys(porCli).sort().forEach(cli=>{
    const lista=porCli[cli].sort((a,b)=>new Date(a.data)-new Date(b.data));
    html+=`<div class="card"><div class="sec-title">👤 ${esc(cli)} <span class="badge b-ok">${lista.length} pallet(s)</span></div>
      <div style="overflow-x:auto;"><table><thead><tr><th>Código</th><th>Produto</th><th>Fabricação</th><th>Turno</th><th>Encarregado</th><th>Lote</th><th>Carregado</th><th>Qualidade</th></tr></thead><tbody>
      ${lista.map(p=>`<tr><td><b>${esc(palCodigo(p))}</b></td><td>${esc(p.produto)}</td><td>${fmtData(p.data)}</td><td>${esc(turnoDe(p))}</td><td>${esc(encarregadoDe(p))}</td><td>${esc(loteDe(p))}</td><td>${fmtDataHora(p.carregado_em)}</td><td>${statusBadge(p)}</td></tr>`).join('')}
      </tbody></table></div></div>`;
  });
  return html;
}

(async function(){
  document.getElementById('ts').textContent=new Date().toLocaleString('pt-BR');
  await carregarEmpresa();
  const params=new URLSearchParams(location.search);
  let palletCod=params.get('pallet'); const ordem=params.get('ordem');
  // tolera QR que contenha a URL inteira
  if(palletCod&&/pallet=/i.test(palletCod)){const mm=/pallet=([^&]+)/i.exec(palletCod);if(mm)palletCod=decodeURIComponent(mm[1]);}
  const cont=document.getElementById('conteudo');
  try{
    if(palletCod){
      const p=await buscarPalletPorCodigo(palletCod);
      if(!p){cont.innerHTML=`<div class="err">Pallet <b>${esc(palletCod)}</b> não encontrado. Verifique se o rótulo foi gerado no sistema.</div>`;return;}
      document.getElementById('sub').textContent='Pallet '+palCodigo(p);
      let carr=null;
      if((p.estoque_status==='carregado'||p.estoque_status==='expedido')&&p.ordem_numero){
        try{const{data}=await _supabase.from('carregamentos').select('transportadora,placa,motorista,hora,data').eq('ordem_numero',String(p.ordem_numero)).order('created_at',{ascending:false}).limit(1).maybeSingle();carr=data||null;}catch(e){}
      }
      cont.innerHTML=renderPallet(p,carr);
    }else if(ordem){
      const{data}=await _supabase.from('producao_pallets').select(SEL).eq('ordem_numero',String(ordem)).eq('estoque_status','carregado');
      const pallets=data||[];
      if(!pallets.length){cont.innerHTML=`<div class="err">Nenhum pallet carregado encontrado para a ordem ${esc(ordem)}.</div>`;return;}
      document.getElementById('sub').textContent='Ordem de carregamento '+ordem;
      cont.innerHTML=renderOrdem(ordem,pallets);
    }else{
      cont.innerHTML='<div class="err">Aponte a câmera no QR de um pallet, ou informe ?pallet=CÓDIGO (ou ?ordem=NÚMERO) na URL.</div>';
    }
  }catch(e){cont.innerHTML=`<div class="err">Erro ao consultar: ${esc(e.message||e)}</div>`;}
})();
</script>
</body>
</html>
