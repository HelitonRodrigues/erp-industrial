<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Industrial — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<style>
.kpi{background:#fff;border-radius:14px;padding:16px 18px;border:1.5px solid #e2e8f0;transition:all .2s;}
.kpi:hover{box-shadow:0 4px 16px rgba(4,45,77,.08);transform:translateY(-2px);}
.kpi-n{font-size:26px;font-weight:800;color:var(--primary);margin:4px 0 2px;}
.kpi-l{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.kpi-s{font-size:11px;color:#64748b;margin-top:2px;}
.ln-card{background:#fff;border-radius:12px;padding:12px 14px;border:1.5px solid #e2e8f0;}
.ln-card.v{border-left:5px solid #22c55e;}.ln-card.a{border-left:5px solid #f59e0b;}.ln-card.r{border-left:5px solid #ef4444;}.ln-card.c{border-left:5px solid #94a3b8;}
.bw{background:#f1f5f9;border-radius:6px;height:7px;overflow:hidden;margin-top:5px;}
.bf{height:100%;border-radius:6px;transition:width .6s;}
.comp{background:#fff;border-radius:12px;padding:14px;border:1.5px solid #e2e8f0;}
.comp-v{font-size:20px;font-weight:800;color:var(--primary);}
.al-c{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:9px 13px;border-radius:8px;margin-bottom:5px;font-size:12px;display:flex;align-items:center;gap:8px;}
.al-a{background:#fef9c3;border:1px solid #fde047;color:#854d0e;padding:9px 13px;border-radius:8px;margin-bottom:5px;font-size:12px;display:flex;align-items:center;gap:8px;}
.cbar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:22px;position:relative;}
.cbar{border-radius:4px 4px 0 0;width:100%;transition:height .4s;cursor:pointer;}
.cbar.hoje{background:#C9FF64 !important;}
.ctip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#042D4D;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;}
.cbar-wrap:hover .ctip{opacity:1;}
.oee-c{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
</style>
</head>
<body>
<div id="sidebar-container"></div>
<header class="topbar" id="topbar">
  <button class="topbar-open-sidebar" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title">Dashboard</div>
  <div class="topbar-right">
    <span style="font-size:11px;color:#64748b;" id="dash-clock"></span>
    <button class="btn btn-ghost btn-sm" onclick="init()" title="Atualizar">🔄</button>
    <div class="topbar-user">
      <div class="user-avatar" style="width:32px;height:32px;font-size:12px;" id="top-avatar">SA</div>
      <div><div class="topbar-user-name" id="top-user-name">Super Admin</div><div class="topbar-user-profile" id="top-user-perfil">SADM</div></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:#64748b;">Sair</button>
  </div>
</header>

<main class="main-content" id="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
    <div>
      <h1 style="margin:0;" id="dash-empresa">ERP Industrial</h1>
      <p style="color:#64748b;font-size:13px;margin:2px 0 0;" id="dash-date">—</p>
    </div>
    <select id="dash-mes" class="form-input" style="width:220px;font-size:12px;" onchange="init()"></select>
  </div>

  <div id="dash-loading" style="text-align:center;padding:60px;color:#94a3b8;">
    <div class="spin" style="width:36px;height:36px;border-width:3px;margin:0 auto 14px;"></div>
    Carregando dados...
  </div>

  <div id="dash-main" style="display:none;">
    <!-- KPIs -->
    <div id="kpis" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-bottom:22px;"></div>

    <!-- STATUS LINHAS + ALERTAS + FILA -->
    <div style="display:grid;grid-template-columns:1fr minmax(280px,320px);gap:16px;margin-bottom:22px;">
      <div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">🏭 Status das Linhas</div>
        <div id="linhas-st" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">🚨 Alertas Críticos</div>
        <div id="alertas-el" style="margin-bottom:16px;"></div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">🚛 Fila Portaria</div>
        <div id="fila-el"></div>
      </div>
    </div>

    <!-- GRÁFICO PRODUÇÃO DIÁRIA -->
    <div class="card" style="margin-bottom:22px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <strong style="font-size:14px;color:var(--primary);">📊 Produção Diária do Mês</strong>
        <div style="display:flex;gap:14px;font-size:11px;color:#94a3b8;align-items:center;">
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--primary);border-radius:2px;margin-right:4px;"></span>Dias anteriores</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#C9FF64;border-radius:2px;margin-right:4px;"></span>Hoje</span>
          <select id="f-linha-graf" class="form-input" style="width:160px;font-size:11px;padding:4px 8px;" onchange="renderGrafico()"><option value="">Todas as linhas</option></select>
        </div>
      </div>
      <div id="grafico-wrap" style="display:flex;align-items:flex-end;gap:3px;height:160px;overflow-x:auto;padding-bottom:24px;"></div>
    </div>

    <!-- OEE POR LINHA -->
    <div class="card" style="margin-bottom:22px;">
      <strong style="font-size:14px;color:var(--primary);display:block;margin-bottom:14px;">📐 OEE por Linha — Disponibilidade × Performance × Qualidade</strong>
      <div id="oee-el" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;"></div>
    </div>

    <!-- COMPARATIVOS MÊS A MÊS -->
    <div class="card">
      <strong style="font-size:14px;color:var(--primary);display:block;margin-bottom:14px;">📈 Comparativo — Mês Atual vs Anterior</strong>
      <div id="comp-el" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;"></div>
    </div>
  </div>
</main>
<div id="toast-container"></div>

<script>
// Dados carregados
let _PM=[],_PP=[],_PH=[],_LN=[],_PLTS=[],_PO=[],_PLANOS=[];

fetch('partials/sidebar.html').then(r=>r.text()).then(html=>{
  document.getElementById('sidebar-container').innerHTML=html;
  document.querySelector('[href="dashboard.html"]')?.classList.add('active');
  openGroup('principal');
  // Inicializar sidebar com dados do usuário e empresa
  initSidebar('dashboard.html');
});

setInterval(()=>{document.getElementById('dash-clock').textContent=new Date().toLocaleTimeString('pt-BR');},1000);

// Montar select de meses ANTES de tudo
(()=>{
  const s=document.getElementById('dash-mes');const h=new Date();
  for(let i=0;i<12;i++){const d=new Date(h.getFullYear(),h.getMonth()-i,1);const v=d.toISOString().slice(0,7);const lb=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});const o=document.createElement('option');o.value=v;o.textContent=lb.charAt(0).toUpperCase()+lb.slice(1);if(i===0)o.selected=true;s.appendChild(o);}
})();



async function init(){
  document.getElementById('dash-loading').style.display='block';
  document.getElementById('dash-main').style.display='none';
  document.getElementById('dash-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const mes=document.getElementById('dash-mes').value||new Date().toISOString().slice(0,7);
  if(!mes){document.getElementById('dash-loading').style.display='none';document.getElementById('dash-main').style.display='block';return;}
  const[ano,m]=mes.split('-').map(Number);
  const mIni=`${mes}-01`;
  // Último dia real do mês (evita problema com meses de 28/30 dias)
  const mFim=new Date(ano,m,0).toISOString().split('T')[0];
  const pAno=m===1?ano-1:ano;
  const mPrev=m===1?12:m-1;
  const pStr=`${pAno}-${String(mPrev).padStart(2,'0')}`;
  const pIni=`${pStr}-01`;
  const pFim=new Date(pAno,mPrev,0).toISOString().split('T')[0];
  const hoje=new Date().toISOString().split('T')[0];

  // Empresa
  try{
    const{data:emp,error:empErr}=await _supabase.from('empresa_config').select('nome_fantasia,razao_social').limit(1).maybeSingle();
    if(emp&&!empErr) document.getElementById('dash-empresa').textContent=emp.nome_fantasia||emp.razao_social||'ERP Industrial';
  }catch(e){}

  let pMes=[],pPrev=[],pH=[],lns=[],port=[],epiV=[],almx=[],manut=[],pals=[],pOntem=[],planos=[];
  // Ontem — declarado fora do try para ficar disponível no renderKPIs
  const ontem=new Date();ontem.setDate(ontem.getDate()-1);
  const ontemStr=ontem.toISOString().split('T')[0];
  try{
    const safe = async q => {try{const r=await q;return r.data||[];}catch(e){return[];}};
    [pMes,pPrev,pH,lns,port,epiV,almx,manut,pals,pOntem,planos]=await Promise.all([
      safe(_supabase.from('producao').select('id,data,linha,turno,encarregado,total_sacos,ht,hp,eficiencia,consumo_lenha,status,paradas_op,efic_disp,efic_prod').gte('data',mIni).lte('data',mFim)),
      safe(_supabase.from('producao').select('total_sacos,consumo_lenha,eficiencia,ht,hp').gte('data',pIni).lte('data',pFim)),
      safe(_supabase.from('producao').select('linha,turno,total_sacos,ht,hp,status,efic_disp').eq('data',hoje)),
      safe(_supabase.from('linhas_producao').select('*').eq('status','ativo').order('nome')),
      safe(_supabase.from('portaria').select('status').in('status',['sem_ordem','aguardando','carregando'])),
      safe(_supabase.from('epi_entregas').select('id').lt('data_prevista_troca',hoje)),
      safe(_supabase.from('almoxarifado').select('nome,estoque_atual,estoque_minimo')),
      safe(_supabase.from('manutencao').select('id,prioridade').in('status',['aberta','em_andamento'])),
      safe(_supabase.from('producao_pallets').select('id,status,linha,responsavel_lab,hora_lab,obs_lab,produto,lancamento_id')),
      safe(_supabase.from('producao').select('linha,total_sacos,ht,hp,status').eq('data',ontemStr)),
      safe(_supabase.from('planejamentos').select('secoes,mes').eq('mes',mes)),
    ]);
  }catch(e){console.warn('Erro nas queries:',e);}

  _PM=pMes; _PP=pPrev; _PH=pH; _LN=lns; _PLTS=pals; _PO=pOntem; _PLANOS=planos;
  // Filtrar pallets apenas do mês atual (via lancamento_id dos lançamentos do mês)
  const lancIdsMes=new Set(pMes.map(l=>l.id).filter(Boolean));
  _PLTS=pals.filter(p=>!p.lancamento_id||lancIdsMes.has(p.lancamento_id));

  try{
    const selL=document.getElementById('f-linha-graf');
    if(selL.options.length===1) _LN.forEach(l=>{const o=document.createElement('option');o.value=l.nome;o.textContent=l.nome;selL.appendChild(o);});
    renderKPIs(hoje,ontemStr);
    renderLinhasStatus();
    console.log('Dashboard — pMes:',_PM.length,'hoje:',_PH.length,'ontem:',_PO.length,'pallets:',_PLTS.length,'planos:',_PLANOS.length,'mIni:',mIni,'mFim:',mFim);
    renderAlertas(almx||[],epiV||[],manut||[],port||[]);
    renderFila(port||[]);
    renderGrafico();
    renderOEE();
    renderComparativos();
  }catch(e){
    console.error('Erro ao renderizar dashboard:',e);
  }finally{
    document.getElementById('dash-loading').style.display='none';
    document.getElementById('dash-main').style.display='block';
  }
}

function renderKPIs(hoje,ontemStr){
  const tSc=_PM.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tScP=_PP.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tLe=_PM.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const tLeP=_PP.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const tHT=_PM.reduce((s,l)=>s+(l.ht||0),0);
  const tHP=_PM.reduce((s,l)=>s+(l.hp||0),0);
  const dispG=tHT>0?((tHT-tHP)/tHT*100).toFixed(1):0;
  // Hoje vs Ontem
  const scH=_PH.reduce((s,l)=>s+(l.total_sacos||0),0);
  const scO=_PO.reduce((s,l)=>s+(l.total_sacos||0),0);
  const vScHO=scO>0?((scH-scO)/scO*100):null;
  const vSc=tScP>0?((tSc-tScP)/tScP*100):0;
  // Pallets
  const palAprov=_PLTS.filter(p=>p.status==='aprovado').length;
  const palRep=_PLTS.filter(p=>p.status==='reprovado').length;
  const palPend=_PLTS.filter(p=>p.status==='pendente').length;
  const palTotal=_PLTS.length;
  const qualPct=palTotal>0?(palAprov/palTotal*100).toFixed(1):null;
  // Paradas do mês
  let totParadasH=0,totParadasN=0;
  _PM.forEach(l=>(l.paradas_op||[]).forEach(p=>{totParadasH+=p.duracao_h||p.duracao_horim||0;totParadasN++;}));
  // Em análise
  const emAnalise=_PM.filter(l=>l.status==='em_analise').length;
  const reprovados=_PM.filter(l=>l.status==='reprovado').length;
  // Média sc/h
  const mediaScH=tHT>0?(tSc/tHT).toFixed(1):0;

  function kpi(ic,n,l,s,cor,vTxt){
    return`<div class="kpi" style="cursor:default;">
      <div style="font-size:16px;">${ic}</div>
      <div class="kpi-n" style="color:${cor};">${n}</div>
      <div class="kpi-l">${l}</div>
      ${s?`<div class="kpi-s" style="font-size:11px;color:#64748b;">${s}</div>`:''}
      ${vTxt?`<div style="font-size:10px;margin-top:3px;font-weight:700;">${vTxt}</div>`:''}
    </div>`;
  }
  function delta(v,ref,inv=false){
    if(ref===null||ref===undefined||ref===0)return'';
    const pct=(v-ref)/Math.abs(ref)*100;
    const good=inv?pct<=0:pct>=0;
    return`<span style="color:${good?'#16a34a':'#dc2626'}">${pct>=0?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
  }

  const dispCor=parseFloat(dispG)>=85?'#16a34a':parseFloat(dispG)>=70?'#b45309':'#dc2626';
  document.getElementById('kpis').innerHTML=
    kpi('⚙️',tSc.toLocaleString('pt-BR'),'Sacos no Mês','Total produzido no período','var(--primary)',delta(tSc,tScP))+
    kpi('📅',scH.toLocaleString('pt-BR'),'Sacos Hoje',`Ontem: ${scO.toLocaleString('pt-BR')} sc — ${_PH.length} turno(s)`,'#2563eb',vScHO!==null?delta(scH,scO):'')+
    kpi('✅',dispG+'%','Disponibilidade','H.Trabalhadas / H.Brutas',dispCor,'')+
    kpi('📈',mediaScH+' sc/h','Média sc/h','Performance do mês','var(--primary)','')+
    kpi('🛑',totParadasN+' / '+totParadasH.toFixed(1)+'h','Paradas','Ocorrências / Horas no mês',totParadasN>0?'#dc2626':'#16a34a','')+
    kpi('🔬',emAnalise,'Em Análise','Lançamentos aguardando lab.',emAnalise>0?'#b45309':'#94a3b8','')+
    kpi('📦',palAprov+' ✅ / '+palRep+' 🔴','Pallets','Aprovados / Reprovados no mês',qualPct?parseFloat(qualPct)>=90?'#16a34a':'#b45309':'#94a3b8',qualPct?`${qualPct}% qualidade`:'')+
    kpi('🌲',tLe.toFixed(1)+' m³','Consumo Lenha','Do mês','#b45309',delta(tLe,tLeP,true));
}

function renderLinhasStatus(){
  document.getElementById('linhas-st').innerHTML=_LN.map(l=>{
    const ll=_PM.filter(p=>p.linha===l.nome);
    const htL=ll.reduce((s,p)=>s+(p.ht||0),0);
    const hpL=ll.reduce((s,p)=>s+(p.hp||0),0);
    const d=htL>0?((htL-hpL)/htL*100).toFixed(1):null;
    const cls=d===null?'c':parseFloat(d)>=85?'v':parseFloat(d)>=70?'a':'r';
    const ic={v:'🟢',a:'🟡',r:'🔴',c:'⚫'}[cls];
    const bc={v:'#22c55e',a:'#f59e0b',r:'#ef4444',c:'#94a3b8'}[cls];
    const hoje=new Date().toISOString().split('T')[0];
    const ultH=_PH.find(p=>p.linha===l.nome);
    const palLnH=_PLTS.filter(p=>p.linha===l.nome);
    const palRepLn=palLnH.filter(p=>p.status==='reprovado').length;
    return`<div class="ln-card ${cls}" style="cursor:pointer;" onclick="window.location.href='producao.html'">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
        <strong style="font-size:12px;color:var(--primary);">${l.nome}</strong>
        <span style="font-size:11px;">${ic} ${d?d+'%':'—'}</span>
      </div>
      ${d?`<div class="bw"><div class="bf" style="width:${Math.min(100,parseFloat(d))}%;background:${bc};"></div></div>`:''}
      <div style="display:flex;justify-content:space-between;margin-top:5px;">
        <div style="font-size:10px;color:#94a3b8;">${ultH?'Hoje: '+(ultH.total_sacos||0).toLocaleString('pt-BR')+' sc | '+ultH.turno:'Sem lançamento hoje'}</div>
        ${palRepLn>0?`<span style="font-size:10px;background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:8px;font-weight:700;">🔴 ${palRepLn} rep.</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderAlertas(almx,epiV,manut,port){
  const als=[];
  const almxZ=(almx||[]).filter(i=>(i.estoque_atual||0)<=0&&(i.estoque_minimo||0)>0);
  const almxB=(almx||[]).filter(i=>(i.estoque_atual||0)>0&&(i.estoque_atual||0)<=(i.estoque_minimo||0)&&(i.estoque_minimo||0)>0);
  const manutUrg=(manut||[]).filter(m=>m.prioridade==='urgente');
  if(almxZ.length) als.push({c:'c',t:`🔴 ${almxZ.length} insumo(s) com estoque ZERADO`});
  if(almxB.length) als.push({c:'a',t:`⚠️ ${almxB.length} insumo(s) abaixo do mínimo`});
  if((epiV||[]).length) als.push({c:'c',t:`🦺 ${epiV.length} EPI(s) vencido(s)`});
  if(manutUrg.length) als.push({c:'c',t:`🔧 ${manutUrg.length} OS urgente(s) em aberto`});
  else if((manut||[]).length) als.push({c:'a',t:`🔧 ${(manut||[]).length} OS(s) abertas/andamento`});
  const semOrdem=(port||[]).filter(p=>p.status==='sem_ordem').length;
  if(semOrdem) als.push({c:'a',t:`🚛 ${semOrdem} caminhão(ões) sem ordem na portaria`});
  // Alertas de produção/laboratório
  const palRep2=_PLTS.filter(p=>p.status==='reprovado').length;
  const palPend2=_PLTS.filter(p=>p.status==='pendente').length;
  const lancRep=_PM.filter(l=>l.status==='reprovado').length;
  const lancAnalise=_PM.filter(l=>l.status==='em_analise').length;
  if(palRep2>0) als.unshift({c:'c',t:`🔴 ${palRep2} pallet(s) REPROVADO(S) no período`});
  if(lancRep>0) als.push({c:'c',t:`🏭 ${lancRep} lançamento(s) com status Reprovado`});
  if(palPend2>5) als.push({c:'a',t:`🟡 ${palPend2} pallets aguardando análise do laboratório`});
  if(lancAnalise>0) als.push({c:'a',t:`🔬 ${lancAnalise} lançamento(s) em análise no laboratório`});
  document.getElementById('alertas-el').innerHTML=als.length
    ?als.slice(0,6).map(a=>`<div class="${a.c==='c'?'al-c':'al-a'}">${a.t}</div>`).join('')
    :'<div style="font-size:12px;color:#94a3b8;padding:8px;">✅ Nenhum alerta crítico</div>';
}

function renderFila(port){
  const fil=port||[];
  document.getElementById('fila-el').__port=fil;
  document.getElementById('fila-el').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
    <div style="background:#fee2e2;border-radius:8px;padding:10px;text-align:center;border:1px solid #fca5a5;"><div style="font-size:20px;font-weight:800;color:#dc2626;">${fil.filter(p=>p.status==='sem_ordem').length}</div><div style="font-size:10px;color:#991b1b;">Sem Ordem</div></div>
    <div style="background:#fef9c3;border-radius:8px;padding:10px;text-align:center;border:1px solid #fde047;"><div style="font-size:20px;font-weight:800;color:#b45309;">${fil.filter(p=>p.status==='aguardando').length}</div><div style="font-size:10px;color:#92400e;">Aguardando</div></div>
    <div style="background:#dcfce7;border-radius:8px;padding:10px;text-align:center;border:1px solid #86efac;"><div style="font-size:20px;font-weight:800;color:#16a34a;">${fil.filter(p=>p.status==='carregando').length}</div><div style="font-size:10px;color:#166534;">Carregando</div></div>
  </div>`;
}

function renderGrafico(){
  const mes=document.getElementById('dash-mes').value;
  const filtroLinha=document.getElementById('f-linha-graf')?.value||'';
  const[ano,m]=mes.split('-').map(Number);
  const dias=new Date(ano,m,0).getDate();
  const hoje=new Date().toISOString().split('T')[0];
  const hojeMes=hoje.slice(0,7)===mes;
  const hojeD=parseInt(hoje.split('-')[2]);

  // Agrupar produção por dia
  const ppd={};
  _PM.filter(l=>!filtroLinha||l.linha===filtroLinha).forEach(l=>{
    const d=parseInt(l.data?.split('-')[2]);
    if(d) ppd[d]=(ppd[d]||0)+(l.total_sacos||0);
  });
  const maxV=Math.max(...Object.values(ppd),1);

  let html='';
  for(let d=1;d<=dias;d++){
    const v=ppd[d]||0;
    const h=v>0?Math.max(8,Math.round(v/maxV*135)):3;
    const isH=hojeMes&&d===hojeD;
    const dow=new Date(ano,m-1,d).getDay();
    const isWE=dow===0||dow===6;
    const bgColor=isH?'#C9FF64':isWE?'rgba(4,45,77,.3)':'var(--primary)';
    html+=`<div class="cbar-wrap">
      <div class="ctip">${d}/${m}: ${v.toLocaleString('pt-BR')} sc</div>
      <div class="cbar${isH?' hoje':''}" style="height:${h}px;background:${bgColor};"></div>
      <div style="font-size:8px;color:${isH?'var(--primary)':'#94a3b8'};margin-top:3px;font-weight:${isH?'700':'400'};">${d}</div>
    </div>`;
  }
  document.getElementById('grafico-wrap').innerHTML=html;
}

function renderOEE(){
  document.getElementById('oee-el').innerHTML=_LN.map(l=>{
    const ll=_PM.filter(p=>p.linha===l.nome);
    if(!ll.length) return`<div class="card" style="padding:12px;opacity:.6;"><strong style="font-size:12px;color:var(--primary);">${l.nome}</strong><div style="font-size:11px;color:#94a3b8;margin-top:4px;">Sem dados no período</div></div>`;
    const htT=ll.reduce((s,p)=>s+(p.ht||0),0);
    const hpT=ll.reduce((s,p)=>s+(p.hp||0),0);
    const scT=ll.reduce((s,p)=>s+(p.total_sacos||0),0);
    // Disponibilidade: HT / HBrutas (do planejamento)
    let horasBrutasTotal=0;
    (_PLANOS||[]).forEach(pl=>(pl.secoes||[]).forEach(s=>{
      if(s.linha===l.nome){const dt=parseInt(s.diasTrabalho)||1;const hb=parseFloat(s.horasBrutas)||0;horasBrutasTotal+=hb;}
    }));
    const dis=horasBrutasTotal>0?Math.min(100,htT/horasBrutasTotal*100):htT>0?Math.min(100,(htT-hpT)/htT*100):0;
    // Performance: sc reais / (capHora × HT)
    let capHoraLn=0;
    (_PLANOS||[]).forEach(pl=>(pl.secoes||[]).forEach(s=>{
      if(s.linha===l.nome)(s.produtos||[]).forEach(p=>{if(p.capHora&&!capHoraLn)capHoraLn=parseFloat(p.capHora)||0;});
    }));
    const prf=capHoraLn>0&&htT>0?Math.min(100,scT/(capHoraLn*htT)*100):Math.min(100,ll.reduce((s,p)=>s+(p.eficiencia||0),0)/ll.length);
    // Qualidade: pallets aprovados / total (dados reais do lab)
    const palLn=_PLTS.filter(p=>p.linha===l.nome);
    const palApr=palLn.filter(p=>p.status==='aprovado').length;
    const palRep=palLn.filter(p=>p.status==='reprovado').length;
    const palPen=palLn.filter(p=>p.status==='pendente').length;
    const qua=palLn.length>0?Math.min(100,palApr/palLn.length*100):100;
    const oee=dis/100*prf/100*qua/100*100;
    const oc=oee>=75?'#16a34a':oee>=50?'#b45309':'#dc2626';
    const mkBar=(v,c2)=>`<div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;margin-top:3px;"><div style="height:100%;width:${Math.min(100,v).toFixed(1)}%;background:${c2};border-radius:4px;"></div></div>`;
    return`<div class="card" style="padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <strong style="font-size:12px;color:var(--primary);">${l.nome}</strong>
        <div style="font-size:10px;color:#64748b;">${ll.length} lanç. | ${scT.toLocaleString('pt-BR')} sc</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="oee-c" style="background:${oc}18;color:${oc};border:3px solid ${oc};">${oee.toFixed(0)}%</div>
        <div style="flex:1;">
          ${[['Disponib.',dis,'#22c55e'],['Performance',prf,'#2563eb'],['Qualidade',qua,'#f59e0b']].map(([lb,vl,c2])=>`
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:1px;">
              <span style="color:#64748b;">${lb}</span>
              <strong style="color:${vl>=85?'#16a34a':vl>=70?'#b45309':'#dc2626'};">${vl.toFixed(1)}%</strong>
            </div>${mkBar(vl,c2)}`).join('')}
        </div>
      </div>
      ${palLn.length>0?`<div style="display:flex;gap:6px;margin-top:8px;font-size:10px;">
        <span style="background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:8px;font-weight:700;">✅ ${palApr}</span>
        <span style="background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:8px;font-weight:700;">🔴 ${palRep}</span>
        ${palPen>0?`<span style="background:#fef9c3;color:#b45309;padding:2px 6px;border-radius:8px;font-weight:700;">🟡 ${palPen}</span>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function renderComparativos(){
  const tSc=_PM.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tScP=_PP.reduce((s,l)=>s+(l.total_sacos||0),0);
  const tLe=_PM.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const tLeP=_PP.reduce((s,l)=>s+(l.consumo_lenha||0),0);
  const tHT=_PM.reduce((s,l)=>s+(l.ht||0),0);
  const tHTP=_PP.reduce((s,l)=>s+(l.ht||0),0);
  const tHP=_PM.reduce((s,l)=>s+(l.hp||0),0);
  const tHPP=_PP.reduce((s,l)=>s+(l.hp||0),0);
  const efM=_PM.length>0?Math.round(_PM.reduce((s,l)=>s+(l.eficiencia||0),0)/_PM.length):0;
  const efMP=_PP.length>0?Math.round(_PP.reduce((s,l)=>s+(l.eficiencia||0),0)/_PP.length):0;
  const palAp=_PLTS.filter(p=>p.status==='aprovado').length;
  const palRp=_PLTS.filter(p=>p.status==='reprovado').length;

  function comp(ic,lb,v,vp,u='',inverter=false){
    const vr=vp>0?(v-vp)/vp*100:0;
    const up=vr>=0;
    const corBoa=inverter?'#dc2626':'#16a34a';
    const corRuim=inverter?'#16a34a':'#dc2626';
    return`<div class="comp">
      <div style="font-size:16px;margin-bottom:4px;">${ic}</div>
      <div class="comp-v">${typeof v==='number'?v.toLocaleString('pt-BR',{maximumFractionDigits:1}):v}${u}</div>
      <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:2px;">${lb}</div>
      <div style="font-size:10px;font-weight:700;color:${up?corBoa:corRuim};margin-top:4px;">${up?'▲':'▼'} ${Math.abs(vr).toFixed(1)}% vs mês ant.</div>
    </div>`;
  }

  document.getElementById('comp-el').innerHTML=
    comp('⚙️','Sacos Produzidos',tSc,tScP)+
    comp('🌲','Lenha (m³)',parseFloat(tLe.toFixed(1)),parseFloat(tLeP.toFixed(1)),'',true)+
    comp('⏱️','Horas Trabalhadas',parseFloat(tHT.toFixed(1)),parseFloat(tHTP.toFixed(1)),'h')+
    comp('🛑','Horas Paradas',parseFloat(tHP.toFixed(1)),parseFloat(tHPP.toFixed(1)),'h',true)+
    comp('📦','Pallets Aprovados',palAp,0)+
    comp('🔴','Pallets Reprovados',palRp,0,'',true)+
    comp('📊','Eficiência Média',efM,efMP,'%');
}

setInterval(init,5*60*1000);
// Aguardar DOM completo antes de iniciar
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
